# =============================================================================
# Standalone GL / Vulkan Swap Interval Jank
# =============================================================================
# Detects long intervals between eglSwapBuffers / vkQueuePresent / queueBuffer
# calls for NativeActivity, GLSurfaceView, or custom graphics renderers.

name: gl_standalone_swap_jank
version: "1.0"
type: atomic
category: rendering
tier: B

meta:
  display_name: "独立 GL/Vulkan Swap 卡顿"
  description: "检测 eglSwapBuffers/vkQueuePresent/queueBuffer 间隔异常，定位 GLSurfaceView/NativeActivity 自渲染掉帧"
  icon: "developer_board"
  tags: [opengl, vulkan, swap_buffers, glsurfaceview, native_activity, jank, atomic]

triggers:
  keywords:
    zh: [GLSurfaceView, NativeActivity, eglSwapBuffers, vkQueuePresent, OpenGL 卡顿, Vulkan 卡顿]
    en: [glsurfaceview, nativeactivity, eglswapbuffers, vkqueuepresent, opengl jank, vulkan jank]
  patterns:
    - ".*(GLSurfaceView|NativeActivity|OpenGL|Vulkan).*(卡顿|掉帧|swap).*"
    - ".*(glsurfaceview|nativeactivity|opengl|vulkan).*(jank|swap|present).*"

prerequisites:
  required_tables:
    - slice
    - thread_track
    - thread
    - process
  modules:
    - slices.with_context

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: swap_interval_summary
    type: atomic
    name: "Swap 间隔汇总"
    display:
      level: summary
      layer: overview
      title: "GL/Vulkan Swap 间隔汇总"
      columns:
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: swap_count
          label: "Swap次数"
          type: number
          format: compact
        - name: target_interval_ms
          label: "目标间隔"
          type: duration
          format: duration_ms
        - name: avg_interval_ms
          label: "平均间隔"
          type: duration
          format: duration_ms
        - name: p95_interval_ms
          label: "P95间隔"
          type: duration
          format: duration_ms
        - name: max_interval_ms
          label: "最大间隔"
          type: duration
          format: duration_ms
        - name: missed_like_count
          label: "疑似掉帧"
          type: number
          format: compact
        - name: rating
          label: "评级"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      swap_events AS (
        SELECT
          s.ts,
          s.dur,
          s.name AS slice_name,
          t.utid,
          t.name AS thread_name,
          p.name AS process_name,
          LAG(s.ts) OVER (PARTITION BY t.utid ORDER BY s.ts) AS prev_swap_ts
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND s.ts >= i.start_ts
          AND s.ts < i.end_ts
          AND (i.target_process != '' OR COALESCE(t.name, '') NOT GLOB 'RenderThread*')
          AND (
            s.name GLOB '*eglSwapBuffers*' OR s.name GLOB '*SwapBuffers*' OR
            s.name GLOB '*vkQueuePresent*' OR
            s.name GLOB '*ANativeWindow_queueBuffer*'
          )
      ),
      swap_intervals AS (
        SELECT
          *,
          ts - prev_swap_ts AS interval_ns
        FROM swap_events
        WHERE prev_swap_ts IS NOT NULL
          AND ts > prev_swap_ts
          AND ts - prev_swap_ts BETWEEN 4000000 AND 100000000
      ),
      target AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER) FROM swap_intervals),
          16666667
        ) AS target_interval_ns
      )
      SELECT
        process_name,
        thread_name,
        COUNT(*) AS swap_count,
        ROUND((SELECT target_interval_ns FROM target) / 1e6, 2) AS target_interval_ms,
        ROUND(AVG(interval_ns) / 1e6, 2) AS avg_interval_ms,
        ROUND(PERCENTILE(interval_ns, 0.95) / 1e6, 2) AS p95_interval_ms,
        ROUND(MAX(interval_ns) / 1e6, 2) AS max_interval_ms,
        SUM(CASE WHEN interval_ns > (SELECT target_interval_ns * 1.5 FROM target) THEN 1 ELSE 0 END) AS missed_like_count,
        CASE
          WHEN MAX(interval_ns) > (SELECT target_interval_ns * 4 FROM target) THEN 'critical'
          WHEN PERCENTILE(interval_ns, 0.95) > (SELECT target_interval_ns * 2 FROM target) THEN 'warning'
          WHEN SUM(CASE WHEN interval_ns > (SELECT target_interval_ns * 1.5 FROM target) THEN 1 ELSE 0 END) > 0 THEN 'notice'
          ELSE 'normal'
        END AS rating
      FROM swap_intervals
      GROUP BY process_name, thread_name
      ORDER BY missed_like_count DESC, max_interval_ms DESC
      LIMIT 50
    save_as: swap_interval_summary

  - id: slow_swap_events
    type: atomic
    name: "慢 Swap 事件"
    display:
      level: detail
      layer: list
      title: "慢 GL/Vulkan Swap 间隔"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: interval_ms
          label: "距离上次Swap"
          type: duration
          format: duration_ms
        - name: swap_dur_ms
          label: "Swap调用耗时"
          type: duration
          format: duration_ms
        - name: slice_name
          label: "Slice"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: process_name
          label: "进程"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      swap_events AS (
        SELECT
          s.ts,
          s.dur,
          s.name AS slice_name,
          t.utid,
          t.name AS thread_name,
          p.name AS process_name,
          LAG(s.ts) OVER (PARTITION BY t.utid ORDER BY s.ts) AS prev_swap_ts
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND s.ts >= i.start_ts
          AND s.ts < i.end_ts
          AND (i.target_process != '' OR COALESCE(t.name, '') NOT GLOB 'RenderThread*')
          AND (
            s.name GLOB '*eglSwapBuffers*' OR s.name GLOB '*SwapBuffers*' OR
            s.name GLOB '*vkQueuePresent*' OR
            s.name GLOB '*ANativeWindow_queueBuffer*'
          )
      ),
      swap_intervals AS (
        SELECT
          *,
          ts - prev_swap_ts AS interval_ns
        FROM swap_events
        WHERE prev_swap_ts IS NOT NULL
          AND ts > prev_swap_ts
          AND ts - prev_swap_ts BETWEEN 4000000 AND 100000000
      ),
      target AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(interval_ns, 0.5) AS INTEGER) FROM swap_intervals),
          16666667
        ) AS target_interval_ns
      )
      SELECT
        printf('%d', ts) AS ts,
        ROUND(interval_ns / 1e6, 2) AS interval_ms,
        ROUND(dur / 1e6, 2) AS swap_dur_ms,
        slice_name,
        thread_name,
        process_name
      FROM swap_intervals
      WHERE interval_ns > (SELECT target_interval_ns * 1.5 FROM target)
      ORDER BY interval_ns DESC
      LIMIT 100
    save_as: slow_swap_events

output:
  format: structured
