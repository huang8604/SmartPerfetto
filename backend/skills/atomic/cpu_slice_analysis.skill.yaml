# =============================================================================
# CPU 时间分析（原子 Skill）
# =============================================================================
# 分析指定时间范围内的 CPU 使用情况

name: cpu_slice_analysis
version: "1.0"
type: atomic
category: hardware

meta:
  display_name: "CPU Slice 分析"
  description: "分析 CPU 时间片分布"
  icon: "pie_chart"
  tags: [cpu, slice, distribution, atomic]

prerequisites:
  required_tables:
    - sched_slice

inputs:
  - name: start_ts
    type: timestamp
    required: true
    description: "开始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: true
    description: "结束时间戳(ns)"
  - name: package
    type: string
    required: false
    description: "应用包名（可选）"

sql: |
  WITH 
  -- 动态检测 CPU 集群
  cpu_max_freq AS (
    SELECT cpu, MAX(value) as max_freq
    FROM counter c
    JOIN cpu_counter_track t ON c.track_id = t.id
    WHERE t.name = 'cpufreq'
    GROUP BY cpu
  ),
  global_max AS (
    SELECT MAX(max_freq) as val FROM cpu_max_freq
  ),
  cpu_clusters AS (
    SELECT cpu,
      CASE
        WHEN max_freq >= (SELECT val FROM global_max) * 0.75 THEN 'big'
        WHEN max_freq >= (SELECT val FROM global_max) * 0.50 THEN 'mid'
        ELSE 'little'
      END as cluster_type
    FROM cpu_max_freq
  ),
  target_threads AS (
    SELECT t.utid, t.tid, t.name as thread_name, p.name as process_name
    FROM thread t
    JOIN process p ON t.upid = p.upid
    WHERE p.name GLOB '${package}*' OR '${package}' = ''
  ),
  cpu_slices AS (
    SELECT
      ss.utid,
      ss.dur,
      ss.cpu,
      COALESCE(cl.cluster_type, 'little') as core_type
    FROM sched_slice ss
    LEFT JOIN cpu_clusters cl ON ss.cpu = cl.cpu
    WHERE ss.ts >= ${start_ts}
      AND ss.ts < ${end_ts}
      AND ss.utid IN (SELECT utid FROM target_threads)
  )
  SELECT
    tt.thread_name,
    tt.process_name,
    SUM(cs.dur) / 1e6 as total_cpu_ms,
    SUM(CASE WHEN cs.core_type = 'big' THEN cs.dur ELSE 0 END) / 1e6 as big_core_ms,
    SUM(CASE WHEN cs.core_type = 'little' THEN cs.dur ELSE 0 END) / 1e6 as little_core_ms,
    COUNT(*) as slice_count,
    AVG(cs.dur) / 1e6 as avg_slice_ms
  FROM target_threads tt
  LEFT JOIN cpu_slices cs ON tt.utid = cs.utid
  GROUP BY tt.utid
  HAVING total_cpu_ms > 0
  ORDER BY total_cpu_ms DESC

output:
  display:
    level: detail
    format: table
    columns:
      - name: thread_name
        label: "线程"
        type: string
      - name: process_name
        label: "进程"
        type: string
      - name: total_cpu_ms
        label: "CPU时间"
        type: duration
        format: duration_ms
      - name: big_core_ms
        label: "大核时间"
        type: duration
        format: duration_ms
      - name: little_core_ms
        label: "小核时间"
        type: duration
        format: duration_ms
      - name: slice_count
        label: "切片数"
        type: number
        format: compact
      - name: avg_slice_ms
        label: "平均切片"
        type: duration
        format: duration_ms
  fields:
    - name: thread_name
      label: "线程"
    - name: total_cpu_ms
      label: "CPU时间(ms)"
    - name: big_core_ms
      label: "大核(ms)"
    - name: little_core_ms
      label: "小核(ms)"
