# =============================================================================
# Media Codec Activity
# =============================================================================
# Conservative media probe based on public slice/thread data. There is no stable
# Android media codec stdlib table in the current symbol index, so this skill
# uses slices.with_context and requires real codec traces for threshold tuning.

name: media_codec_activity
version: "1.0"
type: atomic
category: media
tier: B

meta:
  display_name: "媒体 Codec 活动分析"
  description: "检测 MediaCodec/Codec2/OMX/CCodec 相关线程和 buffer API 切片，定位慢解码、queue/dequeue 和 releaseOutputBuffer 问题"
  icon: "movie"
  tags: [media, codec, decoder, video, audio, buffer, atomic]

triggers:
  keywords:
    zh: [MediaCodec, Codec2, OMX, 解码卡顿, 视频卡顿, 音视频, releaseOutputBuffer]
    en: [mediacodec, codec2, omx, decoder jank, video stutter, releaseOutputBuffer]
  patterns:
    - ".*(MediaCodec|Codec2|OMX|CCodec).*(卡顿|慢|解码|buffer).*"
    - ".*(mediacodec|codec2|omx|ccodec).*(jank|slow|decode|buffer).*"

prerequisites:
  required_tables:
    - slice
    - thread_track
    - thread
    - process
  modules:
    - slices.with_context

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"
  - name: slow_threshold_ms
    type: number
    required: false
    description: "慢 codec 事件阈值(ms)，默认 8"

steps:
  - id: codec_activity_summary
    type: atomic
    name: "Codec 活动汇总"
    display:
      level: summary
      layer: overview
      title: "Media Codec 活动汇总"
      columns:
        - name: phase
          label: "阶段"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: slice_count
          label: "次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: p95_dur_ms
          label: "P95耗时"
          type: duration
          format: duration_ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      codec_slices AS (
        SELECT
          s.ts,
          s.dur,
          s.name AS slice_name,
          COALESCE(t.name, '<unnamed>') AS thread_name,
          p.name AS process_name,
          CASE
            WHEN s.name GLOB '*dequeueInputBuffer*' OR s.name GLOB '*queueInputBuffer*' THEN 'input_buffer'
            WHEN s.name GLOB '*dequeueOutputBuffer*' OR s.name GLOB '*releaseOutputBuffer*' THEN 'output_buffer'
            WHEN s.name GLOB '*MediaCodec*' OR t.name GLOB '*MediaCodec*' THEN 'mediacodec'
            WHEN s.name GLOB '*Codec2*' OR t.name GLOB '*Codec2*' OR s.name GLOB '*C2*' THEN 'codec2'
            WHEN s.name GLOB '*OMX*' OR t.name GLOB '*OMX*' THEN 'omx'
            WHEN s.name GLOB '*CCodec*' OR t.name GLOB '*CCodec*' THEN 'ccodec'
            ELSE 'media_codec'
          END AS phase,
          ROUND(s.dur / 1e6, 2) AS dur_ms
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND s.ts >= i.start_ts
          AND s.ts < i.end_ts
          AND s.dur > 0
          AND (
            s.name GLOB '*MediaCodec*' OR t.name GLOB '*MediaCodec*' OR
            s.name GLOB '*Codec2*' OR t.name GLOB '*Codec2*' OR
            s.name GLOB '*CCodec*' OR t.name GLOB '*CCodec*' OR
            s.name GLOB '*OMX*' OR t.name GLOB '*OMX*' OR
            s.name GLOB '*dequeueInputBuffer*' OR s.name GLOB '*queueInputBuffer*' OR
            s.name GLOB '*dequeueOutputBuffer*' OR s.name GLOB '*releaseOutputBuffer*'
          )
      )
      SELECT
        phase,
        process_name,
        thread_name,
        COUNT(*) AS slice_count,
        ROUND(SUM(dur_ms), 2) AS total_dur_ms,
        ROUND(PERCENTILE(dur_ms, 0.95), 2) AS p95_dur_ms,
        ROUND(MAX(dur_ms), 2) AS max_dur_ms
      FROM codec_slices
      GROUP BY phase, process_name, thread_name
      ORDER BY total_dur_ms DESC, max_dur_ms DESC
      LIMIT 50
    save_as: codec_activity_summary

  - id: slow_codec_events
    type: atomic
    name: "慢 Codec 事件"
    display:
      level: detail
      layer: list
      title: "慢 Media Codec 事件"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur_ns
        - name: dur_ns
          label: "耗时(ns)"
          type: duration
          unit: ns
          hidden: true
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: phase
          label: "阶段"
          type: string
        - name: slice_name
          label: "Slice"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: process_name
          label: "进程"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${slow_threshold_ms}, 8) AS slow_threshold_ms,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      )
      SELECT
        printf('%d', s.ts) AS ts,
        printf('%d', s.dur) AS dur_ns,
        ROUND(s.dur / 1e6, 2) AS dur_ms,
        CASE
          WHEN s.name GLOB '*dequeueInputBuffer*' OR s.name GLOB '*queueInputBuffer*' THEN 'input_buffer'
          WHEN s.name GLOB '*dequeueOutputBuffer*' OR s.name GLOB '*releaseOutputBuffer*' THEN 'output_buffer'
          WHEN s.name GLOB '*MediaCodec*' OR t.name GLOB '*MediaCodec*' THEN 'mediacodec'
          WHEN s.name GLOB '*Codec2*' OR t.name GLOB '*Codec2*' OR s.name GLOB '*C2*' THEN 'codec2'
          WHEN s.name GLOB '*OMX*' OR t.name GLOB '*OMX*' THEN 'omx'
          WHEN s.name GLOB '*CCodec*' OR t.name GLOB '*CCodec*' THEN 'ccodec'
          ELSE 'media_codec'
        END AS phase,
        s.name AS slice_name,
        COALESCE(t.name, '<unnamed>') AS thread_name,
        p.name AS process_name
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      CROSS JOIN input i
      WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
        AND s.ts >= i.start_ts
        AND s.ts < i.end_ts
        AND s.dur > i.slow_threshold_ms * 1000000.0
        AND (
          s.name GLOB '*MediaCodec*' OR t.name GLOB '*MediaCodec*' OR
          s.name GLOB '*Codec2*' OR t.name GLOB '*Codec2*' OR
          s.name GLOB '*CCodec*' OR t.name GLOB '*CCodec*' OR
          s.name GLOB '*OMX*' OR t.name GLOB '*OMX*' OR
          s.name GLOB '*dequeueInputBuffer*' OR s.name GLOB '*queueInputBuffer*' OR
          s.name GLOB '*dequeueOutputBuffer*' OR s.name GLOB '*releaseOutputBuffer*'
        )
      ORDER BY s.dur DESC
      LIMIT 100
    save_as: slow_codec_events

output:
  format: structured
