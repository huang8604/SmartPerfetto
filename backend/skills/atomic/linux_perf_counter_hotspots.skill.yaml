name: linux_perf_counter_hotspots
version: "1.0"
type: atomic
category: kernel
tier: B

meta:
  display_name: "Linux Perf Counter Hotspots"
  description: "基于 linux.perf.counters stdlib 汇总 perf sample counter 热点；无 PMU 数据时返回空"
  icon: "speed"
  tags: [linux, perf, pmu, counters, cache_miss, branch, atomic]

triggers:
  keywords:
    zh: [PMU, perf counter, cache miss, branch miss, 缓存未命中, 分支预测]
    en: [pmu, perf counter, cache miss, branch miss, branch mispredict]
  patterns:
    - ".*(PMU|perf|cache miss|branch).*(热点|统计|分析).*"
    - ".*(pmu|perf|cache|branch).*(hotspot|counter|miss).*"

prerequisites:
  optional_tables:
    - track
  modules:
    - linux.perf.counters

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: perf_counter_hotspots
    type: atomic
    name: "Perf Counter 热点"
    display:
      level: detail
      layer: list
      title: "Linux Perf Counter Hotspots"
      columns:
        - name: counter_name
          label: "Counter"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: sample_count
          label: "样本数"
          type: number
          format: compact
        - name: total_counter_value
          label: "累计值"
          type: number
          format: compact
        - name: avg_counter_value
          label: "平均值"
          type: number
          format: compact
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts), 0) FROM linux_perf_sample_with_counters)) AS end_ts
      )
      SELECT
        COALESCE(tr.name, printf('counter:%d', l.track_id)) AS counter_name,
        COALESCE(p.name, '<kernel/unknown>') AS process_name,
        COALESCE(t.name, printf('utid:%d', l.utid)) AS thread_name,
        COUNT(*) AS sample_count,
        ROUND(SUM(l.counter_value), 2) AS total_counter_value,
        ROUND(AVG(l.counter_value), 2) AS avg_counter_value
      FROM linux_perf_sample_with_counters l
      LEFT JOIN thread t ON l.utid = t.utid
      LEFT JOIN process p ON t.upid = p.upid
      LEFT JOIN track tr ON l.track_id = tr.id
      CROSS JOIN input i
      WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
        AND l.ts >= i.start_ts
        AND l.ts < i.end_ts
      GROUP BY counter_name, process_name, thread_name
      ORDER BY total_counter_value DESC, sample_count DESC
      LIMIT 100
    save_as: perf_counter_hotspots

output:
  format: structured
