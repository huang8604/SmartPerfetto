# =============================================================================
# React Native New Architecture Fabric / JSI Render Jank
# =============================================================================
# Correlates Fabric commit, mounting, JSI, and TurboModule work with frames.

name: rn_fabric_render_jank
version: "1.0"
type: atomic
category: rendering
tier: B

meta:
  display_name: "RN Fabric/JSI 渲染卡顿"
  description: "关联 React Native New Architecture 的 Fabric/JSI/Mounting 同步工作与掉帧帧窗口"
  icon: "account_tree"
  tags: [react_native, rn, fabric, jsi, turbo_module, frame, jank, atomic]

triggers:
  keywords:
    zh: [RN Fabric, JSI, TurboModule, Fabric Mounting, RN 新架构卡顿]
    en: [rn fabric, jsi, turbomodule, fabric mounting, new architecture jank]
  patterns:
    - ".*(Fabric|JSI|TurboModule).*(卡顿|掉帧|同步渲染).*"
    - ".*(fabric|jsi|turbomodule).*(jank|frame|sync).*"

prerequisites:
  required_tables:
    - actual_frame_timeline_slice
    - slice
    - thread_track
    - thread
    - process
  modules:
    - android.frames.timeline
    - slices.with_context

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: fabric_frame_overlap
    type: atomic
    name: "Fabric/JSI 与帧重叠"
    display:
      level: detail
      layer: list
      title: "RN Fabric / JSI 同步工作与帧重叠"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur_ns
        - name: dur_ns
          label: "耗时(ns)"
          type: duration
          unit: ns
          hidden: true
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: phase
          label: "阶段"
          type: string
        - name: slice_name
          label: "Slice"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: overlapped_frames
          label: "重叠帧数"
          type: number
          format: compact
        - name: janky_frames
          label: "掉帧重叠"
          type: number
          format: compact
        - name: max_overlap_ms
          label: "最大重叠"
          type: duration
          format: duration_ms
        - name: severity
          label: "严重程度"
          type: string
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      frame_budget AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(dur, 0.5) AS INTEGER)
           FROM actual_frame_timeline_slice
           WHERE dur BETWEEN 5000000 AND 50000000),
          16666667
        ) AS budget_ns
      ),
      fabric_slices AS (
        SELECT
          s.id,
          s.ts,
          s.dur,
          s.ts + s.dur AS ts_end,
          s.name AS slice_name,
          t.name AS thread_name,
          p.name AS process_name,
          p.upid,
          CASE
            WHEN s.name GLOB '*Fabric*' OR s.name GLOB '*SurfaceMountingManager*' OR s.name GLOB '*executeMount*' OR s.name GLOB '*MountItem*' THEN 'fabric_mounting'
            WHEN s.name GLOB '*ShadowTree*' THEN 'shadow_tree_commit'
            WHEN s.name GLOB '*JSI*' THEN 'jsi_sync'
            WHEN s.name GLOB '*TurboModule*' THEN 'turbo_module'
            WHEN s.name GLOB '*Reanimated*' THEN 'reanimated'
            ELSE 'rn_new_arch'
          END AS phase
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND s.ts >= i.start_ts
          AND s.ts < i.end_ts
          AND s.dur > 0
          AND (
            s.name GLOB '*Fabric*' OR s.name GLOB '*SurfaceMountingManager*' OR
            s.name GLOB '*executeMount*' OR s.name GLOB '*MountItem*' OR s.name GLOB '*ShadowTree*' OR
            s.name GLOB '*JSI*' OR s.name GLOB '*TurboModule*' OR s.name GLOB '*Reanimated*' OR
            t.name GLOB '*mqt_native_modules*'
          )
      ),
      frames AS (
        SELECT
          a.ts,
          a.dur,
          a.ts + a.dur AS ts_end,
          COALESCE(a.display_frame_token, a.surface_frame_token) AS frame_id,
          COALESCE(a.jank_type, 'None') AS jank_type,
          a.upid
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND a.ts >= i.start_ts
          AND a.ts < i.end_ts
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      overlaps AS (
        SELECT
          fs.*,
          f.frame_id,
          f.dur AS frame_dur,
          f.jank_type,
          MAX(0, MIN(fs.ts_end, f.ts_end) - MAX(fs.ts, f.ts)) AS overlap_ns
        FROM fabric_slices fs
        JOIN frames f ON f.upid = fs.upid
          AND fs.ts < f.ts_end
          AND fs.ts_end > f.ts
      )
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur_ns,
        ROUND(dur / 1e6, 2) AS dur_ms,
        phase,
        slice_name,
        thread_name,
        process_name,
        COUNT(DISTINCT frame_id) AS overlapped_frames,
        SUM(CASE WHEN jank_type != 'None' OR frame_dur > (SELECT budget_ns * 1.5 FROM frame_budget) THEN 1 ELSE 0 END) AS janky_frames,
        ROUND(MAX(overlap_ns) / 1e6, 2) AS max_overlap_ms,
        CASE
          WHEN dur > (SELECT budget_ns * 2 FROM frame_budget) AND SUM(CASE WHEN jank_type != 'None' OR frame_dur > (SELECT budget_ns * 1.5 FROM frame_budget) THEN 1 ELSE 0 END) > 0 THEN 'critical'
          WHEN dur > (SELECT budget_ns FROM frame_budget) THEN 'warning'
          ELSE 'notice'
        END AS severity
      FROM overlaps
      WHERE overlap_ns > 0
      GROUP BY id, ts, dur, phase, slice_name, thread_name, process_name
      HAVING janky_frames > 0 OR dur_ms > 8
      ORDER BY janky_frames DESC, dur_ms DESC
      LIMIT 100
    save_as: fabric_frame_overlap

output:
  format: structured
