# =============================================================================
# React Native Old Architecture Bridge → Frame Jank
# =============================================================================
# Correlates BatchedBridge / JS thread / UIManager work with Android frames.

name: rn_bridge_to_frame_jank
version: "1.0"
type: atomic
category: rendering
tier: B

meta:
  display_name: "RN Bridge 到帧卡顿关联"
  description: "关联 React Native old-arch Bridge/JS/UIManager 工作与掉帧帧窗口"
  icon: "hub"
  tags: [react_native, rn, bridge, javascript, frame, jank, atomic]

triggers:
  keywords:
    zh: [React Native, RN Bridge, BatchedBridge, JS 线程, RN 卡顿]
    en: [react native, rn bridge, batchedbridge, js thread, rn jank]
  patterns:
    - ".*(React Native|RN).*(Bridge|JS|卡顿|掉帧).*"
    - ".*(react native|rn).*(bridge|js|jank|frame).*"

prerequisites:
  required_tables:
    - actual_frame_timeline_slice
    - slice
    - thread_track
    - thread
    - process
  modules:
    - android.frames.timeline
    - slices.with_context

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: process_name
    type: string
    required: false
    description: "目标进程名别名；当 package 为空时使用"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  - id: rn_bridge_frame_overlap
    type: atomic
    name: "RN Bridge 与帧重叠"
    display:
      level: detail
      layer: list
      title: "RN Bridge / JS 工作与掉帧帧重叠"
      columns:
        - name: ts
          label: "Bridge时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur_ns
        - name: dur_ns
          label: "Bridge耗时(ns)"
          type: duration
          unit: ns
          hidden: true
        - name: bridge_dur_ms
          label: "Bridge耗时"
          type: duration
          format: duration_ms
        - name: phase
          label: "阶段"
          type: string
        - name: slice_name
          label: "Slice"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: overlapped_frames
          label: "重叠帧数"
          type: number
          format: compact
        - name: janky_frames
          label: "掉帧重叠"
          type: number
          format: compact
        - name: max_overlap_ms
          label: "最大重叠"
          type: duration
          format: duration_ms
        - name: max_frame_dur_ms
          label: "最大帧耗时"
          type: duration
          format: duration_ms
    sql: |
      WITH
      input AS (
        SELECT
          COALESCE(NULLIF('${package|}', ''), NULLIF('${process_name|}', ''), '') AS target_process,
          COALESCE(${start_ts}, 0) AS start_ts,
          COALESCE(${end_ts}, (SELECT COALESCE(MAX(ts + dur), 0) FROM slice)) AS end_ts
      ),
      frame_budget AS (
        SELECT COALESCE(
          (SELECT CAST(PERCENTILE(dur, 0.5) AS INTEGER)
           FROM actual_frame_timeline_slice
           WHERE dur BETWEEN 5000000 AND 50000000),
          16666667
        ) AS budget_ns
      ),
      rn_slices AS (
        SELECT
          s.id,
          s.ts,
          s.dur,
          s.ts + s.dur AS ts_end,
          s.name AS slice_name,
          t.name AS thread_name,
          p.name AS process_name,
          p.upid,
          CASE
            WHEN t.name GLOB '*mqt_js*' OR t.name GLOB '*JS*' OR s.name GLOB '*BatchedBridge*' THEN 'js_bridge'
            WHEN s.name GLOB '*UIManager*' OR s.name GLOB '*dispatchViewUpdates*' THEN 'ui_manager'
            WHEN s.name GLOB '*RCTEventEmitter*' OR s.name GLOB '*callFunctionReturnFlushedQueue*' THEN 'bridge_dispatch'
            WHEN s.name GLOB '*ReactChoreographer*' THEN 'react_choreographer'
            ELSE 'rn_old_arch'
          END AS phase
        FROM slice s
        JOIN thread_track tt ON s.track_id = tt.id
        JOIN thread t ON tt.utid = t.utid
        JOIN process p ON t.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND s.ts >= i.start_ts
          AND s.ts < i.end_ts
          AND s.dur > 0
          AND (
            t.name GLOB '*mqt_js*' OR t.name GLOB '*mqt_native_modules*' OR t.name GLOB '*JS*' OR
            s.name GLOB '*BatchedBridge*' OR s.name GLOB '*callFunctionReturnFlushedQueue*' OR
            s.name GLOB '*UIManager*' OR s.name GLOB '*dispatchViewUpdates*' OR
            s.name GLOB '*RCTEventEmitter*' OR s.name GLOB '*ReactChoreographer*'
          )
      ),
      frames AS (
        SELECT
          a.ts,
          a.dur,
          a.ts + a.dur AS ts_end,
          COALESCE(a.display_frame_token, a.surface_frame_token) AS frame_id,
          COALESCE(a.jank_type, 'None') AS jank_type,
          a.upid
        FROM actual_frame_timeline_slice a
        JOIN process p ON a.upid = p.upid
        CROSS JOIN input i
        WHERE (i.target_process = '' OR p.name GLOB i.target_process || '*')
          AND a.ts >= i.start_ts
          AND a.ts < i.end_ts
          AND COALESCE(a.display_frame_token, a.surface_frame_token) IS NOT NULL
      ),
      overlaps AS (
        SELECT
          rs.*,
          f.frame_id,
          f.dur AS frame_dur,
          f.jank_type,
          MAX(0, MIN(rs.ts_end, f.ts_end) - MAX(rs.ts, f.ts)) AS overlap_ns
        FROM rn_slices rs
        JOIN frames f ON f.upid = rs.upid
          AND rs.ts < f.ts_end
          AND rs.ts_end > f.ts
      )
      SELECT
        printf('%d', ts) AS ts,
        printf('%d', dur) AS dur_ns,
        ROUND(dur / 1e6, 2) AS bridge_dur_ms,
        phase,
        slice_name,
        thread_name,
        process_name,
        COUNT(DISTINCT frame_id) AS overlapped_frames,
        SUM(CASE WHEN jank_type != 'None' OR frame_dur > (SELECT budget_ns * 1.5 FROM frame_budget) THEN 1 ELSE 0 END) AS janky_frames,
        ROUND(MAX(overlap_ns) / 1e6, 2) AS max_overlap_ms,
        ROUND(MAX(frame_dur) / 1e6, 2) AS max_frame_dur_ms
      FROM overlaps
      WHERE overlap_ns > 0
      GROUP BY id, ts, dur, phase, slice_name, thread_name, process_name
      HAVING janky_frames > 0 OR bridge_dur_ms > 8
      ORDER BY janky_frames DESC, bridge_dur_ms DESC
      LIMIT 100
    save_as: rn_bridge_frame_overlap

output:
  format: structured
