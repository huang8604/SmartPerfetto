# =============================================================================
# 启动主线程热点切片（原子 Skill）
# =============================================================================

name: startup_main_thread_slices_in_range
version: "1.0"
type: atomic
category: app_lifecycle

meta:
  display_name: "启动主线程切片热点 (区间)"
  description: "统计启动阶段主线程切片热点"
  icon: "view_timeline"
  tags: [startup, main_thread, slice, atomic]

prerequisites:
  modules:
    - android.startup.startups

inputs:
  - name: package
    type: string
    required: false
  - name: startup_id
    type: integer
    required: false
  - name: startup_type
    type: string
    required: false
  - name: start_ts
    type: timestamp
    required: false
  - name: end_ts
    type: timestamp
    required: false
  - name: min_dur_ns
    type: integer
    required: false
  - name: top_k
    type: integer
    required: false

display:
  level: key
  layer: overview
  title: "主线程耗时操作 Top15"
  columns:
    - name: slice_name
      label: "操作名称"
      type: string
    - name: thread_name
      label: "线程"
      type: string
    - name: count
      label: "次数"
      type: number
      format: compact
    - name: total_dur_ms
      label: "总耗时(wall)"
      type: duration
      format: duration_ms
    - name: self_dur_ms
      label: "自身耗时"
      type: duration
      format: duration_ms
    - name: avg_dur_ms
      label: "平均耗时"
      type: duration
      format: duration_ms
    - name: max_dur_ms
      label: "最大耗时"
      type: duration
      format: duration_ms
    - name: percent_of_startup
      label: "启动占比(wall)"
      type: percentage
      format: percentage
    - name: self_percent
      label: "启动占比(self)"
      type: percentage
      format: percentage
    - name: startup_type
      label: "启动类型"
      type: string

sql: |
  WITH raw AS (
    SELECT
      ts.slice_name,
      ts.thread_name,
      ts.slice_dur,
      ts.slice_id,
      s.dur as startup_dur,
      '${startup_type}' as startup_type,
      s.package
    FROM android_thread_slices_for_all_startups ts
    JOIN android_startups s ON ts.startup_id = s.startup_id
    WHERE ts.is_main_thread = 1
      AND (s.package GLOB '${package}*' OR '${package}' = '')
      AND (${startup_id} IS NULL OR s.startup_id = ${startup_id})
      AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
      AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
      AND ts.slice_dur > ${min_dur_ns|1000000}
  ),
  with_self AS (
    SELECT
      r.*,
      r.slice_dur - COALESCE((
        SELECT SUM(c.dur)
        FROM slice c
        WHERE c.parent_id = r.slice_id
      ), 0) as self_dur
    FROM raw r
  )
  SELECT
    slice_name,
    thread_name,
    COUNT(*) as count,
    SUM(slice_dur) / 1e6 as total_dur_ms,
    ROUND(SUM(self_dur) / 1e6, 2) as self_dur_ms,
    ROUND(AVG(slice_dur) / 1e6, 2) as avg_dur_ms,
    ROUND(MAX(slice_dur) / 1e6, 2) as max_dur_ms,
    ROUND(100.0 * SUM(slice_dur) / startup_dur, 1) as percent_of_startup,
    ROUND(100.0 * SUM(self_dur) / startup_dur, 1) as self_percent,
    startup_type,
    package
  FROM with_self
  GROUP BY slice_name
  ORDER BY total_dur_ms DESC
  LIMIT ${top_k|15}

output:
  format: structured