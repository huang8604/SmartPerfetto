# =============================================================================
# GC Events in Range (Atomic Skill)
# =============================================================================
# Queries GC events for a given process and optional time range.
# Centralizes the 3-clause GLOB filter and GC type classification logic
# that was previously duplicated across 7+ steps in memory_analysis.
#
# GC Detection Pattern (unified):
#   s.name GLOB '*GC*' OR s.name GLOB '*gc*' OR s.name GLOB '*ConcurrentCopying*'
#
# GC Type Classification:
#   ConcurrentCopying, MarkSweep, Explicit, Alloc, Background, Young, Full, Other
#
# Usage: Call via `type: skill` step, then reference ${gc_base.data} or
# use the saved data for subsequent aggregation steps.
# =============================================================================

name: gc_events_in_range
version: "1.0"
type: atomic
category: memory

meta:
  display_name: "GC 事件查询"
  description: "查询 GC 事件并分类，供后续分析步骤复用"
  icon: "memory"
  tags: [gc, memory, events, atomic]

prerequisites:
  modules:
    - android.garbage_collection

inputs:
  - name: package
    type: string
    required: true
    description: "应用包名"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳（纳秒，可选）"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳（纳秒，可选）"

display:
  level: detail
  layer: list
  title: "GC 事件"
  columns:
    - name: ts
      label: "时间戳"
      type: timestamp
      clickAction: navigate_timeline
    - name: dur
      label: "持续时间"
      type: duration
      format: duration_ms
      unit: ns
    - name: gc_name
      label: "GC 名称"
      type: string
    - name: gc_type
      label: "GC 类型"
      type: string
    - name: thread_name
      label: "线程"
      type: string
    - name: is_main_thread
      label: "主线程"
      type: number
    - name: reclaimed_mb
      label: "回收(MB)"
      type: number
    - name: gc_running_dur
      label: "GC运行时间"
      type: duration
      format: duration_ms
      unit: ns

sql: |
  -- Use Perfetto stdlib android_garbage_collection_events (precise gc_type classification,
  -- heap metrics, and CPU state breakdown). Note: returns 0 rows on older traces that
  -- lack GC tracepoints; the agent should fall back to manual GLOB-based slice query.
  SELECT
    gc_ts as ts,
    gc_dur as dur,
    gc_type as gc_name,
    thread_name,
    tid,
    pid,
    process_name,
    CASE WHEN tid = pid THEN 1 ELSE 0 END as is_main_thread,
    gc_type,
    -- Stdlib bonus columns (not available in fallback)
    is_mark_compact,
    reclaimed_mb,
    min_heap_mb,
    max_heap_mb,
    gc_running_dur,
    gc_runnable_dur,
    gc_unint_io_dur
  FROM android_garbage_collection_events
  WHERE process_name GLOB '${package}*'
    AND (${start_ts} IS NULL OR gc_ts >= ${start_ts})
    AND (${end_ts} IS NULL OR gc_ts < ${end_ts})
  ORDER BY gc_ts

save_as: gc_events

output:
  format: structured