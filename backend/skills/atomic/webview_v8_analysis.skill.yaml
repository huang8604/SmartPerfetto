# =============================================================================
# WebView V8 JavaScript 引擎性能分析（原子 Skill）
# =============================================================================
# 分析 WebView 中 V8 引擎的性能：GC 事件、脚本编译、执行时间。
# 检测 V8 GC 对帧渲染的影响。

name: webview_v8_analysis
version: "1.0"
type: atomic
category: rendering

meta:
  display_name: "WebView V8 性能分析"
  description: "分析 WebView V8 引擎性能：GC 事件、脚本编译、执行时间"
  icon: "javascript"
  tags: [webview, v8, javascript, gc, compilation, atomic]

prerequisites:
  required_tables:
    - slice
  modules:
    - android.frames.timeline

inputs:
  - name: package
    type: string
    required: false
    description: "目标进程名（支持 GLOB）"
  - name: start_ts
    type: timestamp
    required: false
    description: "分析起始时间戳(ns)"
  - name: end_ts
    type: timestamp
    required: false
    description: "分析结束时间戳(ns)"

steps:
  # ========== V8 GC 事件分析 ==========
  - id: v8_gc_events
    type: atomic
    name: "V8 GC 事件"
    display:
      level: overview
      layer: overview
      title: "V8 GC 事件概览"
      columns:
        - name: gc_type
          label: "GC 类型"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: count
          label: "次数"
          type: number
          format: compact
        - name: total_dur_ms
          label: "总耗时"
          type: duration
          format: duration_ms
        - name: avg_dur_ms
          label: "平均耗时"
          type: duration
          format: duration_ms
        - name: max_dur_ms
          label: "最大耗时"
          type: duration
          format: duration_ms
        - name: rating
          label: "评级"
          type: string
    sql: |
      SELECT
        CASE
          WHEN s.name GLOB '*MajorGC*' OR s.name GLOB '*V8.GCCompactor*' THEN 'MajorGC'
          WHEN s.name GLOB '*MinorGC*' OR s.name GLOB '*V8.GCScavenger*' THEN 'MinorGC'
          WHEN s.name GLOB '*v8.gc*' OR s.name GLOB '*V8.GC*' THEN 'V8.GC'
          ELSE 'Other GC'
        END as gc_type,
        p.name as process_name,
        COUNT(*) as count,
        ROUND(SUM(s.dur) / 1e6, 2) as total_dur_ms,
        ROUND(AVG(s.dur) / 1e6, 2) as avg_dur_ms,
        ROUND(MAX(s.dur) / 1e6, 2) as max_dur_ms,
        CASE
          WHEN MAX(s.dur) / 1e6 > 50 THEN '严重'
          WHEN MAX(s.dur) / 1e6 > 16 THEN '需优化'
          WHEN SUM(s.dur) / 1e6 > 100 THEN '需优化'
          ELSE '正常'
        END as rating
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
        AND (s.name GLOB '*v8.gc*' OR s.name GLOB '*V8.GC*'
             OR s.name GLOB '*MajorGC*' OR s.name GLOB '*MinorGC*'
             OR s.name GLOB '*V8.GCScavenger*' OR s.name GLOB '*V8.GCCompactor*')
      GROUP BY gc_type, p.name
      ORDER BY SUM(s.dur) DESC
    save_as: v8_gc_events

  # ========== V8 脚本执行分析 ==========
  - id: v8_script_execution
    type: atomic
    name: "V8 脚本执行"
    display:
      level: detail
      layer: list
      title: "V8 JavaScript 执行时间"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur_ns
        - name: slice_name
          label: "Slice 名称"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: dur_ns
          label: "耗时(ns)"
          type: duration
          unit: ns
          hidden: true
        - name: severity
          label: "严重程度"
          type: string
    sql: |
      SELECT
        printf('%d', s.ts) as ts,
        s.name as slice_name,
        p.name as process_name,
        t.name as thread_name,
        ROUND(s.dur / 1e6, 2) as dur_ms,
        printf('%d', s.dur) as dur_ns,
        CASE
          WHEN s.dur / 1e6 > 100 THEN 'critical'
          WHEN s.dur / 1e6 > 32 THEN 'warning'
          WHEN s.dur / 1e6 > 16 THEN 'notice'
          ELSE 'normal'
        END as severity
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
        AND s.name GLOB '*v8.run*'
      ORDER BY s.dur DESC
      LIMIT 50
    save_as: v8_script_execution

  # ========== V8 编译开销分析 ==========
  - id: v8_compilation
    type: atomic
    name: "V8 编译开销"
    display:
      level: detail
      layer: list
      title: "V8 脚本编译开销"
      columns:
        - name: ts
          label: "时间"
          type: timestamp
          unit: ns
          clickAction: navigate_range
          durationColumn: dur_ns
        - name: slice_name
          label: "Slice 名称"
          type: string
        - name: process_name
          label: "进程"
          type: string
        - name: thread_name
          label: "线程"
          type: string
        - name: dur_ms
          label: "耗时"
          type: duration
          format: duration_ms
        - name: dur_ns
          label: "耗时(ns)"
          type: duration
          unit: ns
          hidden: true
    sql: |
      SELECT
        printf('%d', s.ts) as ts,
        s.name as slice_name,
        p.name as process_name,
        t.name as thread_name,
        ROUND(s.dur / 1e6, 2) as dur_ms,
        printf('%d', s.dur) as dur_ns
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND (${start_ts} IS NULL OR s.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR s.ts + s.dur <= ${end_ts})
        AND s.name GLOB '*v8.compile*'
      ORDER BY s.dur DESC
      LIMIT 50
    save_as: v8_compilation

  # ========== V8 GC 对帧渲染的影响 ==========
  - id: v8_frame_impact
    type: atomic
    name: "V8 GC 帧影响"
    optional: true
    display:
      level: detail
      layer: deep
      title: "V8 GC 与帧渲染重叠"
      columns:
        - name: gc_ts
          label: "GC 时间"
          type: timestamp
          unit: ns
          clickAction: navigate_timeline
        - name: gc_name
          label: "GC 事件"
          type: string
        - name: gc_dur_ms
          label: "GC 耗时"
          type: duration
          format: duration_ms
        - name: frame_dur_ms
          label: "帧耗时"
          type: duration
          format: duration_ms
        - name: jank_type
          label: "卡顿类型"
          type: string
        - name: overlap_ms
          label: "重叠时间"
          type: duration
          format: duration_ms
    sql: |
      SELECT
        printf('%d', gc.ts) as gc_ts,
        gc.name as gc_name,
        ROUND(gc.dur / 1e6, 2) as gc_dur_ms,
        ROUND(af.dur / 1e6, 2) as frame_dur_ms,
        af.jank_type,
        ROUND(
          (MIN(gc.ts + gc.dur, af.ts + af.dur) - MAX(gc.ts, af.ts)) / 1e6, 2
        ) as overlap_ms
      FROM slice gc
      JOIN thread_track tt ON gc.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      JOIN actual_frame_timeline_slice af ON (
        af.upid = p.upid
        AND gc.ts < af.ts + af.dur
        AND gc.ts + gc.dur > af.ts
      )
      WHERE (p.name GLOB '${package}*' OR '${package}' = '')
        AND (${start_ts} IS NULL OR gc.ts >= ${start_ts})
        AND (${end_ts} IS NULL OR gc.ts + gc.dur <= ${end_ts})
        AND (gc.name GLOB '*v8.gc*' OR gc.name GLOB '*V8.GC*'
             OR gc.name GLOB '*MajorGC*' OR gc.name GLOB '*MinorGC*'
             OR gc.name GLOB '*V8.GCScavenger*' OR gc.name GLOB '*V8.GCCompactor*')
      ORDER BY gc.dur DESC
      LIMIT 30
    save_as: v8_frame_impact

output:
  format: structured