# =============================================================================
# Software Compositing Pipeline
# =============================================================================
# SurfaceFlinger CPU compositing fallback when GPU composition is unavailable.
# Detects scenarios where SF performs software compositing instead of HWC/GPU.
# =============================================================================

name: pipeline_software_compositing
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: SOFTWARE_COMPOSITING
  display_name: "软件合成回退"
  description: "SurfaceFlinger CPU 软件合成回退，GPU 合成不可用时的降级路径"
  icon: "memory"
  family: surfaceflinger
  doc_path: "rendering_pipelines/software_compositing.md"
  # ----- Article-grounded signature (S01 + S05/S06 HWC client composition) -----
  s_article_ref: "S01"   # S01 §HWC 决策职责 + 合成路径
  four_features:
    producer_threads: []   # 该 pipeline 不是 App 侧管线，是 SF 侧合成路径
    consumer_threads: ["SurfaceFlinger"]
    expected_layer_count: "any"
    bufferqueue_path: "SF_CLIENT_COMPOSITION"   # SF 用 GPU 把多 layer 合到 client target buffer，再 HWC present
    extra_rhythm_sources: []
  deviation_anchors: "anchor_10_client_composition_when_hwc_rejects"
  # 锚点偏离：⑩ client composition 由 SF 用 GPU（或极端 fallback CPU）把无法 device composition 的 layer 合到 client target。
  # 不要混淆"SF 软件合成"与 ANDROID_VIEW_SOFTWARE（应用侧 lockCanvas 软件绘制）—— 这两个是完全不同概念。
  difference_from_android_view_software: |
    ANDROID_VIEW_SOFTWARE：应用侧 CPU Skia 绘制（lockCanvas/unlockCanvasAndPost），无 RenderThread。
    SOFTWARE_COMPOSITING：SF 侧 client composition（HWC 把 layer 打回 SF GPU 合成）。
    两者都叫"软件"但本质不同：前者是 Producer 路径，后者是 Consumer 合成路径。
  hwc_fallback_triggers: |
    HWC 把 layer 从 DEVICE 降级到 CLIENT（S01 5 步谈判）的常见原因：
    - 透明混合（alpha < 1.0 且复杂遮挡关系）
    - 旋转或缩放超 HWC 能力
    - overlay plane 数量不足（同屏 layer > HWC plane 上限）
    - 受保护内容路径（DRM/HDCP）
    - 色彩空间或 HDR 元数据不支持
    - HWC 自身不支持的混合模式

detection:
  required_signals:
    - thread: SurfaceFlinger
      min_count: 1

  scoring_signals:
    - signal: has_handle_message_refresh
      slice_pattern: "*handleMessageRefresh*"
      weight: 30
    - signal: has_sf_commit
      slice_pattern: "*commit*"
      weight: 15
    - signal: has_sf_composite
      slice_pattern: "*composite*"
      weight: 15
    - signal: has_validate_display
      slice_pattern: "*validateDisplay*"
      weight: 20
    - signal: has_present_display
      slice_pattern: "*presentDisplay*"
      weight: 20

  exclude_if:
    - slice_pattern: "GPU completion*"
    - slice_pattern: "*eglSwapBuffers*"

teaching:
  title: "SurfaceFlinger 软件合成管线"
  summary: |
    当 GPU 合成不可用或不适用时，SurfaceFlinger 会回退到 CPU 软件合成路径。
    常见触发场景包括：
    - GPU 不可用（低端设备或 GPU 被占用）
    - Layer 数量超过 HWC 硬件叠加层上限
    - 不支持的混合模式或像素格式
    - 安全内容保护需要 CPU 合成
    - 调试/降级模式

    软件合成性能显著低于 GPU/HWC 合成，通常导致 SurfaceFlinger
    主线程耗时增加，可能影响帧率和显示延迟。

  mermaid: |
    sequenceDiagram
      participant App as App Process
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger
      participant VAL as HWC Validate
      participant CPU as CPU Compositor
      participant DISP as Display

      Note over App,DISP: Software Compositing Fallback Path
      App->>BQ: queueBuffer (帧提交)

      VS->>SF: VSync-sf 触发
      activate SF
      SF->>SF: handleMessageRefresh
      SF->>SF: latchBuffer (获取 Layer 缓冲区)
      SF->>VAL: validateDisplay
      Note over VAL: HWC 拒绝部分/全部 Layer
      VAL-->>SF: 返回需要 Client 合成的 Layer 列表

      SF->>CPU: CPU 软件合成 (Skia/OpenGL fallback)
      activate CPU
      CPU->>CPU: 逐 Layer 像素混合
      CPU->>CPU: 颜色空间转换/缩放
      deactivate CPU

      SF->>DISP: presentDisplay (提交合成结果)
      deactivate SF

      Note over App,DISP: ⚠️ CPU 合成延迟高于 GPU/HWC 路径

  thread_roles:
    - thread: SurfaceFlinger
      role: "合成调度 + CPU 合成"
      description: "handleMessageRefresh 驱动合成流程，回退时执行 CPU 像素混合"
      trace_tags:
        - "handleMessageRefresh"
        - "composite"
        - "validateDisplay"
        - "presentDisplay"

  key_slices:
    - name: "handleMessageRefresh"
      thread: SurfaceFlinger
      description: "SurfaceFlinger 合成主入口，每帧触发"
    - name: "validateDisplay"
      thread: SurfaceFlinger
      description: "HWC 验证 Layer 合成方式（Client/Device/Cursor）"
    - name: "composite"
      thread: SurfaceFlinger
      description: "执行实际合成操作（软件合成时耗时显著增加）"
    - name: "presentDisplay"
      thread: SurfaceFlinger
      description: "提交合成结果到显示硬件"

auto_pin:
  instructions:
    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 1
      reason: "VSync (SurfaceFlinger 合成触发)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 2
      reason: "SurfaceFlinger (软件合成执行)"
      main_thread_only: true
      expand: true
      smart_filter:
        enabled: true
        description: "Pin SurfaceFlinger 主线程以观察 CPU 合成耗时"

    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 3
      reason: "VSync (App 帧生产参考)"

analysis:
  common_issues:
    - id: sf_cpu_compositing_overhead
      name: "CPU 合成开销过大"
      description: "SurfaceFlinger 回退到 CPU 合成导致主线程耗时增加"
      detection_skill: sf_composition_in_range
    - id: hwc_layer_overflow
      name: "HWC 叠加层溢出"
      description: "Layer 数量超过硬件叠加层上限，触发 Client 合成"
      detection_skill: surfaceflinger_analysis

    # ----- Article-grounded issues (S01 + S05/S06) -----
    - id: client_composition_increases_gpu_load
      name: "Client composition 加重 SF GPU 负担"
      description: |
        HWC 拒绝某 layer 后 SF 用 GPU 合成到 client target buffer，再交回 HWC present。
        这一段 GPU 工作完全压在 SF 进程，挤占 game/video/UI 应用自己的 GPU 预算 — 多 layer 场景尤其明显。
      detection_skill: gpu_render_in_range

    - id: hwc_decision_oscillation
      name: "HWC 决策反复抖动"
      description: |
        相邻几帧 layer 几何/可见性变化频繁时 HWC 重新评估，
        device ↔ client 合成方式来回切换会造成功耗和延迟周期性抬升。
        S05 §"功耗上涨、带宽突然变高、偶发卡顿，常常发生在这种策略切换附近"。
      detection_skill: sf_layer_count_in_range

    - id: hwc_secure_composition_path
      name: "DRM/HDCP 强制 secure overlay 路径"
      description: |
        受保护内容（GRALLOC_USAGE_PROTECTED）必须走 secure overlay 或 secure composition 路径。
        路径错（例如 TextureView 走 HWUI 普通 GPU context 读 protected buffer）→ 黑屏或拒绝播放。
      detection_skill: surfaceflinger_analysis

  recommended_skills:
    - sf_composition_in_range
    - surfaceflinger_analysis
    - cpu_analysis