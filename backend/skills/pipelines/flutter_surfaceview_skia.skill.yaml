# =============================================================================
# Flutter SurfaceView Skia Pipeline
# =============================================================================
# Flutter with Skia rendering engine using SurfaceView.
# Legacy rendering mode with runtime shader compilation.
# =============================================================================

name: pipeline_flutter_surfaceview_skia
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: FLUTTER_SURFACEVIEW_SKIA
  display_name: "Flutter SurfaceView (Skia)"
  description: "Flutter + Skia 引擎，运行时 Shader 编译 (Runtime Shader Compilation)"
  icon: "flutter"
  family: flutter
  doc_path: "rendering_pipelines/flutter_surfaceview.md"
  # ----- Article-grounded signature (S10) -----
  s_article_ref: "S10"
  four_features:
    producer_threads: ["1.ui", "1.raster", "1.io"]
    optional_producer_threads: ["DartWorker*", "io.flutter.*"]
    expected_layer_count: 1
    bufferqueue_path: "ENGINE_TO_INDEPENDENT_SURFACE"
    extra_rhythm_sources: ["engine_animator_beginframe"]
  deviation_anchors: "engine_anchor_2_3_4_5_6_at_engine_threads_skia_backend"
  # 与 Impeller 相同的 Engine 路径，区别仅在 ⑤ raster 阶段使用 Skia backend（含运行时 shader 编译）。
  layer_signature: 'io.flutter.* surface 名（独立 layer）'
  subvariants_note: |
    文章 S10 的 Skia 后端路径——与 Impeller 是同一个 RenderMode.surface 的两种 backend。
    现代 Flutter 默认 Impeller，Skia 仍出现在：旧版本、特定配置、Impeller fallback 场景。
  skia_disadvantage: |
    Skia 运行时 shader compilation：首次使用新 effect 触发 shader 编译，
    导致首帧/首场景卡顿。Trace 中 SkGpu / SkiaGpu 配合 GrShaderUtils 是典型信号。

detection:
  scoring_signals:
    - signal: has_skgpu
      slice_pattern: "*SkGpu*"
      weight: 35
    - signal: has_skiagpu
      slice_pattern: "*SkiaGpu*"
      weight: 30
    - signal: has_flutter_raster
      thread_pattern: "*raster*"
      weight: 10
    - signal: has_flutter_ui_hint
      thread_pattern: "*ui*"
      weight: 8
    - signal: has_dart_worker
      thread_pattern: "DartWorker*"
      weight: 18
    - signal: has_flutter_jit
      slice_pattern: "*io.flutter*"
      weight: 12

  exclude_if:
    - slice_pattern: "*EntityPass*"

teaching:
  title: "Flutter SurfaceView (Skia) 渲染管线"
  summary: |
    Flutter 使用 Skia 渲染引擎，通过 SurfaceView 独立渲染。
    Skia 使用运行时 Shader 编译 (Runtime Shader Compilation)，首次使用新效果时可能有编译卡顿。
    在旧版本、特定配置或 Impeller fallback 场景中仍可能使用该模式，需重点关注 Shader 编译与光栅化耗时。

  mermaid: |
    sequenceDiagram
      participant VA as VSync-app
      participant UI as ui/main (Dart)
      participant IO as 1.io
      participant Raster as raster (Skia)
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over VA,SF: 📍 Flutter Frame Production (Skia)
      VA->>UI: 🔔 VSync → BeginFrame (常见)
      activate UI
      UI->>UI: Dart VM 执行 (build → layout → paint)
      UI->>UI: 生成 Layer Tree
      UI->>Raster: 提交 Layer Tree
      deactivate UI

      activate Raster
      Raster->>Raster: SkGpu::DrawLayers
      Raster->>Raster: GPU 光栅化 (OpenGL/Vulkan)
      Raster->>BQ: queueBuffer
      deactivate Raster

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over IO: 1.io 线程负责图片解码
      Note over VA,SF: ⚠️ Skia 运行时 Shader 编译可能导致首帧卡顿
  thread_roles:
    - thread: "ui / main / 1.ui"
      role: "Dart UI 线程"
      description: "执行 Dart 代码，生成 Layer Tree；线程名依版本变化"
    - thread: "raster / 1.raster"
      role: "Skia 光栅化"
      description: "使用 Skia 光栅化"
    - thread: "1.io"
      role: "Flutter IO"
      description: "资源加载"

  key_slices:
    - name: "SkGpu"
      thread: "raster / 1.raster"
      description: "Skia GPU 渲染提示信号"
    - name: "Rasterizer"
      thread: "raster / 1.raster"
      description: "光栅化操作提示信号"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (Flutter 开始生产帧)"

    - pattern: "^1\\.ui$"
      match_by: name
      priority: 2
      reason: "Dart UI 线程 (生产)"

    - pattern: "^1\\.raster$"
      match_by: name
      priority: 3
      reason: "Skia 光栅化 (传输)"

    - pattern: "io\\.flutter"
      match_by: name
      priority: 4
      reason: "Flutter IO"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: shader_compilation
      name: "Shader 编译卡顿"
      description: "运行时 Shader 编译 (Runtime Shader Compilation) 导致首次使用卡顿"
      detection_skill: jank_frame_detail

    # ----- Article-grounded issues (S10) -----
    - id: ui_thread_overrun
      name: "1.ui 线程超 budget"
      description: "Dart build/layout/paint 过重；与 Impeller 路径相同。"
      detection_skill: app_frame_production

    - id: raster_thread_overrun
      name: "1.raster 线程超 budget（含 Skia 编译）"
      description: |
        GPU submission 重 / fence 等待 / Skia shader 首次编译。
        Skia 路径下 raster 线程超 budget 还可能因 shader 缓存未命中。
      detection_skill: gpu_render_in_range

    - id: skia_first_use_jank
      name: "首次使用新效果的 Shader 编译卡顿"
      description: |
        Skia 运行时编译 shader：首次使用某个 BlendMode / SkShader / RuntimeEffect 时触发编译。
        缓解：预热（precache shader）、SkSL warmup、降级到 Impeller。
      detection_skill: jank_frame_detail

  recommended_skills:
    - scrolling_analysis
    - jank_frame_detail
    - gpu_analysis
    - flutter_scrolling_analysis
