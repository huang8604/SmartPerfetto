# =============================================================================
# WebView TextureView Custom Pipeline
# =============================================================================
# Custom WebView kernel (X5/UC) using TextureView.
# Third-party WebView implementations in China.
# =============================================================================

name: pipeline_webview_textureview_custom
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: WEBVIEW_TEXTUREVIEW_CUSTOM
  display_name: "WebView TextureView (定制内核)"
  description: "X5/UC 等定制 WebView 内核，使用 TextureView"
  icon: "web"
  family: webview
  doc_path: "rendering_pipelines/webview_textureview_custom.md"
  # ----- Article-grounded signature (S09 + S04) -----
  s_article_ref: "S09"
  four_features:
    producer_threads: ["WebViewCore", "X5*", "UCCore*", "TBS*"]
    consumer_threads: ["RenderThread"]
    expected_layer_count: 1   # 网页内容回宿主，单 layer
    bufferqueue_path: "CUSTOM_KERNEL_TO_SURFACETEXTURE_TO_HOST_BBQ"   # 定制内核 → SurfaceTexture → 宿主 RT updateTexImage
    extra_rhythm_sources: ["custom_kernel_rhythm"]
  deviation_anchors: "custom_kernel_to_host_resample_anchor_5"
  # 锚点偏离：与 FLUTTER_TEXTUREVIEW 类似，但 Producer 是国内定制内核（X5/UC/TBS）。
  # 内核可能有自己的渲染优化策略，但整体仍是 SurfaceTexture producer + 宿主侧再次合成 的架构。
  custom_kernels: |
    国内常见定制内核：
    - 腾讯 X5 / TBS（QQ、微信、QQ 浏览器）
    - 阿里 UCCore（UC 浏览器、夸克、支付宝）
    - 百度 ZeusCore（百度 App）
  subvariants_note: "文章 S09 列出的 5 种 WebView 路径之一（参 webview_gl_functor 注释）。"

detection:
  scoring_signals:
    - signal: has_tbs
      slice_pattern: "*TBS*"
      weight: 30
    - signal: has_x5
      slice_pattern: "*X5*"
      weight: 30
    - signal: has_uccore
      slice_pattern: "*UCCore*"
      weight: 20

  exclude_if:
    - thread: "1.ui"           # Flutter engine present → use Flutter pipeline

teaching:
  title: "WebView TextureView (定制内核) 渲染管线"
  summary: |
    使用腾讯 X5、UC 等第三方定制 WebView 内核，通常使用 TextureView
    进行渲染。这些内核可能有自己的渲染优化策略，但整体上仍属于
    “SurfaceTexture producer + 宿主侧再次合成”的架构；回调线程和消费线程实现差异很大。

  mermaid: |
    sequenceDiagram
      participant Main as App (main)
      participant RT as RenderThread
      participant X5 as X5/UC Core
      participant TV as TextureView
      participant BQ as BufferQueue
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over Main,SF: 📍 自定义 WebView 内核 (X5/UC)
      Main->>X5: 加载网页
      activate X5
      X5->>TV: 渲染到 TextureView
      X5->>TV: queueBuffer / produce frame
      deactivate X5

      Main->>RT: syncFrameState
      activate RT
      RT->>RT: DrawFrame
      RT->>RT: 绑定 TextureView 纹理
      RT->>BQ: queueBuffer
      deactivate RT

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over Main,SF: 🇨🇳 国内常见的第三方 WebView 方案
  thread_roles:
    - thread: main
      role: "UI 集成"
      description: "承载定制 WebView 的 Activity"
    - thread: RenderThread
      role: "纹理合成"
      description: "将定制内核内容作为纹理合成"
    - thread: WebViewCore
      role: "定制内核渲染"
      description: "X5/UC 等内核渲染线程（trace 中可能表现为 WebViewCore/CrRendererMain/其他专用线程）"

  key_slices:
    - name: "SurfaceTexture"
      thread: any
      description: "TextureView/SurfaceTexture 生产-消费链路"
    - name: "updateTexImage (hint)"
      thread: RenderThread
      description: "消费侧更新纹理的常见提示信号"
    - name: "syncFrameState"
      thread: RenderThread
      description: "宿主 UI 与 RenderThread 同步，驱动纹理合成"
    - name: "DrawFrame"
      thread: RenderThread
      description: "宿主 RenderThread 合成 WebView 纹理并提交"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (WebView 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "UI 集成 (生产)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的宿主主线程"

    - pattern: "CrRendererMain|WebViewCore|UCCore|X5"
      match_by: name
      priority: 3
      reason: "定制内核渲染 (生产/传输)"
      smart_filter:
        enabled: true
        description: "仅 Pin 属于当前 app 的内核进程/线程（多 app trace 下减少噪音）"

    - pattern: "SurfaceTexture|updateTexImage|onFrameAvailable"
      match_by: name
      priority: 3.5
      reason: "SurfaceTexture (纹理生产-消费/出图关键)"

    - pattern: "^RenderThread(\\s+\\d+)?$"
      match_by: name
      priority: 4
      reason: "纹理合成 (传输)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的 RenderThread"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    # ----- Article-grounded issues (S09 + S04) -----
    - id: custom_kernel_invisible_to_aosp_optimizations
      name: "AOSP 优化对定制内核失效"
      description: |
        AOSP WebView 优化（OOP-R / Viz / SurfaceControl）仅适用于 stock WebView。
        X5/UC/TBS 等定制内核不走这些路径，性能特征与 stock 完全不同——分析时不要套用 stock 经验。
      detection_skill: cpu_analysis

    - id: textureview_resample_overhead
      name: "宿主 RT updateTexImage + GPU 重采样开销"
      description: |
        定制内核走 TextureView 路径，所有 S04 TextureView 的代价都适用：updateTexImage acquire、
        GPU 重采样、YUV→RGB 色彩转换、acquire/release 双层 fence。
      detection_skill: gpu_render_in_range

    - id: kernel_thread_naming_unstable
      name: "定制内核线程名不稳定"
      description: |
        X5/UC/TBS 定制内核的线程名随版本变化大（X5_GLBackbufferThread / TbsRenderThread / UCRenderingThread 等）。
        Trace 中识别需要交叉用 process name + slice 名 pattern。
      detection_skill: cpu_analysis

  recommended_skills:
    - render_thread_slices
    - cpu_analysis
