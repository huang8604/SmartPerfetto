# =============================================================================
# Framework WMS Module Expert (Window Manager Service)
# =============================================================================
# Provides window management analysis capabilities for cross-domain experts.
# Answers questions about window transitions, animations, and display management.
#
# Key Analysis Areas:
# - Window animation timing (open/close/transition)
# - Activity transition animations
# - Window state changes (focused, visible, etc.)
# - Multi-window/split-screen scenarios
# - PopupWindow/Dialog lifecycle
# =============================================================================

name: wms_module
version: "1.0"
type: composite
category: framework

meta:
  display_name: "WMS 窗口管理分析"
  description: "分析窗口动画、Activity 转场和窗口状态变化"
  tags: ["framework", "wms", "window", "animation", "transition"]

# Module metadata
module:
  layer: framework
  component: WMS
  subsystems:
    - window_animation
    - activity_transition
    - window_state
    - display_management
  relatedModules:
    - framework_ams
    - framework_surfaceflinger
    - framework_input
    - app_third_party

# Dialogue interface - how cross-domain experts interact with this module
dialogue:
  capabilities:
    - id: window_animation_analysis
      questionTemplate: "What window animations happened for package {package}?"
      requiredParams: [package]
      optionalParams: [start_ts, end_ts]
      description: "Analyze window open/close/transition animations"

    - id: activity_transition_timing
      questionTemplate: "What is the activity transition timing for package {package}?"
      requiredParams: [package]
      description: "Analyze activity transition animation duration"

    - id: window_state_changes
      questionTemplate: "What window state changes happened at timestamp {ts}?"
      requiredParams: [ts]
      optionalParams: [package]
      description: "Track window visibility and focus changes"

    - id: slow_window_animation
      questionTemplate: "Why was window animation slow for package {package}?"
      requiredParams: [package]
      description: "Diagnose slow window animations"

  findingsSchema:
    - id: slow_window_animation
      severity: warning
      titleTemplate: "Slow window animation: {animation_type} took {dur_ms}ms"
      descriptionTemplate: "Window animation exceeded smooth threshold ({dur_ms}ms > 300ms)"
      evidenceFields: [animation_type, dur_ms, window_name, expected_ms]

    - id: animation_frame_drop
      severity: critical
      titleTemplate: "Animation frame drop: {dropped_frames} frames during {animation_type}"
      descriptionTemplate: "Window animation dropped {dropped_frames} frames causing jank"
      evidenceFields: [animation_type, dropped_frames, total_frames]

    - id: window_focus_delay
      severity: warning
      titleTemplate: "Window focus delay: {delay_ms}ms"
      descriptionTemplate: "Window took {delay_ms}ms to gain focus after request"
      evidenceFields: [delay_ms, window_name]

    - id: transition_overlap
      severity: info
      titleTemplate: "Transition overlap detected"
      descriptionTemplate: "Multiple window transitions happening simultaneously"
      evidenceFields: [transition_count, overlap_duration_ms]

  suggestionsSchema:
    - id: check_surfaceflinger
      condition: "animation_frame_drop > 0"
      targetModule: surfaceflinger_module
      questionTemplate: "What caused frame drops during window animation?"
      paramsMapping:
        start_ts: animation_start_ts
        end_ts: animation_end_ts
      priority: 1

    - id: check_main_thread
      condition: "dur_ms > 300"
      targetModule: scheduler_module
      questionTemplate: "Why was main thread slow during window animation for {package}?"
      paramsMapping:
        package: package
      priority: 1

    - id: check_gpu_during_animation
      condition: "animation_type contains 'transition'"
      targetModule: gpu_module
      questionTemplate: "What was GPU utilization during window transition?"
      paramsMapping: {}
      priority: 2

prerequisites:
  required_tables:
    - slice
    - thread
    - process
  optional_tables:
    - window_manager_shell_transitions

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"
  - name: ts
    type: timestamp
    required: false
    description: "Target timestamp"
  - name: start_ts
    type: timestamp
    required: false
    description: "Analysis start timestamp"
  - name: end_ts
    type: timestamp
    required: false
    description: "Analysis end timestamp"

steps:
  # Step 1: Window animation overview
  - id: window_animation_overview
    type: atomic
    name: "窗口动画概览"
    sql: |
      SELECT
        s.name AS animation_type,
        COUNT(*) AS animation_count,
        CAST(AVG(s.dur) / 1e6 AS INTEGER) AS avg_dur_ms,
        CAST(MAX(s.dur) / 1e6 AS INTEGER) AS max_dur_ms,
        CAST(MIN(s.dur) / 1e6 AS INTEGER) AS min_dur_ms,
        CAST(SUM(s.dur) / 1e6 AS INTEGER) AS total_dur_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (p.name = 'system_server' OR p.name LIKE '%systemui%')
        AND (s.name GLOB '*WindowAnimation*'
             OR s.name GLOB '*Transition*'
             OR s.name GLOB '*openAnimation*'
             OR s.name GLOB '*closeAnimation*'
             OR s.name GLOB '*AppTransition*'
             OR s.name GLOB '*startingWindow*')
      GROUP BY s.name
      ORDER BY total_dur_ms DESC
      LIMIT 20
    display:
      level: key
      layer: overview
      title: "窗口动画统计"
    save_as: animation_overview
    synthesize:
      role: overview
      fields:
        - key: animation_type
          label: 动画类型
        - key: animation_count
          label: 次数
        - key: avg_dur_ms
          label: 平均耗时
          format: "{{value}}ms"

  # Step 2: Activity transition timing
  - id: activity_transitions
    type: atomic
    name: "Activity 转场分析"
    sql: |
      SELECT
        s.ts,
        s.name AS transition_type,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms,
        CASE
          WHEN s.dur / 1e6 < 200 THEN 'smooth'
          WHEN s.dur / 1e6 < 350 THEN 'acceptable'
          WHEN s.dur / 1e6 < 500 THEN 'slow'
          ELSE 'very_slow'
        END AS quality
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name = 'system_server'
        AND (s.name GLOB '*activityStart*'
             OR s.name GLOB '*activityResume*'
             OR s.name GLOB '*AppTransition*'
             OR s.name GLOB '*startActivity*')
        AND s.dur > 1000000  -- > 1ms
      ORDER BY s.dur DESC
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "Activity 转场事件"
    save_as: transitions

  # Step 3: Window state changes
  - id: window_state_changes
    type: atomic
    name: "窗口状态变化"
    sql: |
      SELECT
        s.ts,
        s.name AS state_event,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms,
        t.name AS thread_name
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name = 'system_server'
        AND (s.name GLOB '*windowFocus*'
             OR s.name GLOB '*setVisibility*'
             OR s.name GLOB '*relayoutWindow*'
             OR s.name GLOB '*finishDrawing*'
             OR s.name GLOB '*WindowState*')
        AND s.dur > 1000000
      ORDER BY s.ts DESC
      LIMIT 50
    display:
      level: detail
      layer: list
      title: "窗口状态变化"
    save_as: state_changes

  # Step 4: Slow window animations (> 300ms)
  - id: slow_animations
    type: atomic
    name: "慢动画检测"
    sql: |
      SELECT
        s.ts,
        s.name AS animation_type,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms,
        300 AS threshold_ms,
        CAST((s.dur / 1e6 - 300) AS INTEGER) AS exceed_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (p.name = 'system_server' OR p.name LIKE '%systemui%')
        AND (s.name GLOB '*Animation*'
             OR s.name GLOB '*Transition*')
        AND s.dur > 300000000  -- > 300ms
      ORDER BY s.dur DESC
      LIMIT 20
    display:
      level: detail
      layer: list
      title: "慢窗口动画"
    save_as: slow_animations

  # Step 5: Window draw latency for target package
  - id: window_draw_latency
    type: atomic
    name: "窗口绘制延迟"
    sql: |
      SELECT
        s.name AS draw_event,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_dur_ms,
        CAST(MAX(s.dur) / 1e6 AS REAL) AS max_dur_ms,
        COUNT(*) AS event_count
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND (s.name GLOB '*draw*'
             OR s.name GLOB '*finishDrawing*'
             OR s.name GLOB '*performDraw*'
             OR s.name GLOB '*hwuiDraw*')
      GROUP BY s.name
      ORDER BY avg_dur_ms DESC
      LIMIT 15
    display:
      level: detail
      layer: list
      title: "窗口绘制耗时"
    save_as: draw_latency

  # Step 6: Diagnose window issues
  - id: wms_diagnosis
    type: diagnostic
    name: "WMS 诊断"
    inputs: [animation_overview, transitions, slow_animations, draw_latency]
    rules:
      - condition: "slow_animations.data.length > 0"
        diagnosis: "检测到 ${slow_animations.data.length} 个慢窗口动画，最长 ${slow_animations.data[0]?.dur_ms}ms"
        confidence: high
        suggestions:
          - "检查动画期间是否有主线程阻塞"
          - "检查 GPU 渲染负载"
          - "考虑简化动画效果"
        evidence_fields:
          - slow_animations.data.length
          - slow_animations.data[0]?.dur_ms
          - slow_animations.data[0]?.animation_type

      - condition: "transitions.data.filter(t => t.quality === 'very_slow').length > 3"
        diagnosis: "多个 Activity 转场过慢 (>500ms)"
        confidence: high
        suggestions:
          - "检查 Activity 生命周期中的耗时操作"
          - "优化首帧渲染性能"
        evidence_fields:
          - transitions.data[0]?.dur_ms
          - transitions.data[0]?.transition_type

      - condition: "animation_overview.data[0]?.max_dur_ms > 500"
        diagnosis: "窗口动画最大耗时 ${animation_overview.data[0]?.max_dur_ms}ms，超过 500ms 阈值"
        confidence: medium
        suggestions:
          - "分析具体动画场景"
          - "检查系统负载情况"
        evidence_fields:
          - animation_overview.data[0]?.animation_type
          - animation_overview.data[0]?.max_dur_ms

      - condition: "draw_latency.data[0]?.avg_dur_ms > 16"
        diagnosis: "应用窗口绘制平均耗时 ${draw_latency.data[0]?.avg_dur_ms}ms，超过 16ms 帧时间"
        confidence: medium
        suggestions:
          - "优化 onDraw 实现"
          - "减少过度绘制"
          - "使用硬件加速"
        evidence_fields:
          - draw_latency.data[0]?.draw_event
          - draw_latency.data[0]?.avg_dur_ms
    display:
      level: key
      layer: overview
      title: "WMS 诊断结果"
