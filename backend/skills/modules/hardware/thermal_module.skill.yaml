# =============================================================================
# Hardware Thermal Module Expert
# =============================================================================
# Provides thermal analysis capabilities for cross-domain experts.
# Answers questions about temperature, thermal throttling, and cooling behavior.
#
# Key Analysis Areas:
# - Temperature sensor data across thermal zones
# - Thermal throttling detection and impact
# - Cooling policy analysis
# - Temperature vs performance correlation
# =============================================================================

name: thermal_module
version: "1.0"
type: composite
category: hardware

meta:
  display_name: "热管理分析"
  description: "分析温度传感器、热节流和散热策略"
  tags: ["hardware", "thermal", "temperature", "throttling", "cooling"]

# Module metadata
module:
  layer: hardware
  component: Thermal
  subsystems:
    - temperature_sensors
    - thermal_throttling
    - cooling_device
    - thermal_zone
  relatedModules:
    - hardware_cpu
    - hardware_gpu
    - kernel_scheduler

# Dialogue interface
dialogue:
  capabilities:
    - id: thermal_overview
      questionTemplate: "What is the thermal state during the trace?"
      requiredParams: []
      description: "Get overall thermal status"

    - id: thermal_throttling_analysis
      questionTemplate: "Is there thermal throttling affecting performance?"
      requiredParams: []
      optionalParams: [start_ts, end_ts]
      description: "Detect and analyze thermal throttling"

    - id: temperature_timeline
      questionTemplate: "How did temperature change over time?"
      requiredParams: []
      description: "Track temperature changes throughout trace"

    - id: thermal_correlation
      questionTemplate: "Is temperature affecting CPU/GPU performance?"
      requiredParams: []
      description: "Correlate thermal state with performance metrics"

  findingsSchema:
    - id: thermal_throttling_detected
      severity: critical
      titleTemplate: "Thermal throttling detected: {throttle_level}"
      descriptionTemplate: "CPU/GPU throttled due to temperature ({temp}°C exceeds {threshold}°C)"
      evidenceFields: [throttle_level, temp, threshold, affected_component]

    - id: high_temperature
      severity: warning
      titleTemplate: "High temperature: {zone_name} at {temp}°C"
      descriptionTemplate: "Thermal zone {zone_name} reached {temp}°C, approaching threshold"
      evidenceFields: [zone_name, temp, threshold]

    - id: temperature_spike
      severity: warning
      titleTemplate: "Temperature spike: +{delta}°C in {duration_sec}s"
      descriptionTemplate: "Rapid temperature increase detected"
      evidenceFields: [delta, duration_sec, peak_temp, zone_name]

    - id: sustained_high_temp
      severity: critical
      titleTemplate: "Sustained high temperature: {avg_temp}°C for {duration_sec}s"
      descriptionTemplate: "Temperature remained high for extended period"
      evidenceFields: [avg_temp, duration_sec, zone_name]

  suggestionsSchema:
    - id: check_cpu_frequency
      condition: "throttling_detected == true"
      targetModule: cpu_module
      questionTemplate: "How did thermal throttling affect CPU frequency?"
      paramsMapping: {}
      priority: 1

    - id: check_gpu_during_thermal
      condition: "gpu_temp_high == true"
      targetModule: gpu_module
      questionTemplate: "How did thermal state affect GPU performance?"
      paramsMapping: {}
      priority: 1

prerequisites:
  required_tables:
    - counter
    - counter_track

inputs:
  - name: start_ts
    type: timestamp
    required: false
    description: "Analysis start timestamp"
  - name: end_ts
    type: timestamp
    required: false
    description: "Analysis end timestamp"

steps:
  # Step 1: Temperature overview by thermal zone
  - id: temperature_overview
    type: atomic
    name: "温度概览"
    sql: |
      SELECT
        ct.name AS sensor_name,
        COUNT(*) AS sample_count,
        CAST(MIN(c.value) AS INTEGER) AS min_temp,
        CAST(MAX(c.value) AS INTEGER) AS max_temp,
        CAST(AVG(c.value) AS INTEGER) AS avg_temp,
        CAST(MAX(c.value) - MIN(c.value) AS INTEGER) AS temp_range,
        CASE
          WHEN MAX(c.value) > 80 THEN 'critical'
          WHEN MAX(c.value) > 70 THEN 'warning'
          WHEN MAX(c.value) > 60 THEN 'elevated'
          ELSE 'normal'
        END AS status
      FROM counter c
      JOIN counter_track ct ON c.track_id = ct.id
      WHERE ct.name GLOB '*thermal*'
        OR ct.name GLOB '*temp*'
        OR ct.name GLOB '*temperature*'
        OR ct.name GLOB '*tsens*'
        OR ct.name GLOB '*Temp*'
      GROUP BY ct.name
      ORDER BY max_temp DESC
    display:
      level: key
      layer: overview
      title: "温度传感器概览"
    save_as: temp_overview
    synthesize:
      role: overview
      fields:
        - key: sensor_name
          label: 传感器
        - key: avg_temp
          label: 平均温度
          format: "{{value}}°C"
        - key: max_temp
          label: 最高温度
          format: "{{value}}°C"
        - key: status
          label: 状态
    on_empty: "未找到温度数据，请确保 trace 包含 thermal/temperature 计数器"

  # Step 2: Temperature timeline
  - id: temperature_timeline
    type: atomic
    name: "温度时间线"
    sql: |
      WITH
      time_range AS (
        SELECT MIN(ts) as start_ts FROM counter
      ),
      thermal_samples AS (
        SELECT
          (c.ts - (SELECT start_ts FROM time_range)) / 1e9 as time_sec,
          ct.name as sensor_name,
          c.value as temperature
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE ct.name GLOB '*thermal*'
          OR ct.name GLOB '*temp*'
          OR ct.name GLOB '*temperature*'
      )
      SELECT
        CAST(time_sec AS INTEGER) as second,
        sensor_name,
        CAST(AVG(temperature) AS INTEGER) as avg_temp,
        CAST(MAX(temperature) AS INTEGER) as max_temp
      FROM thermal_samples
      GROUP BY CAST(time_sec AS INTEGER), sensor_name
      ORDER BY second, sensor_name
      LIMIT 300
    display:
      level: detail
      layer: list
      title: "温度时间线"
    save_as: temp_timeline

  # Step 3: High temperature periods
  - id: high_temp_periods
    type: atomic
    name: "高温时段"
    sql: |
      WITH
      time_range AS (
        SELECT MIN(ts) as start_ts FROM counter
      ),
      high_temps AS (
        SELECT
          (c.ts - (SELECT start_ts FROM time_range)) / 1e9 as time_sec,
          ct.name as sensor_name,
          c.value as temperature
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE (ct.name GLOB '*thermal*' OR ct.name GLOB '*temp*')
          AND c.value > 60
      )
      SELECT
        sensor_name,
        ROUND(MIN(time_sec), 2) as start_sec,
        ROUND(MAX(time_sec), 2) as end_sec,
        ROUND(MAX(time_sec) - MIN(time_sec), 2) as duration_sec,
        CAST(MAX(temperature) AS INTEGER) as peak_temp,
        CAST(AVG(temperature) AS INTEGER) as avg_temp,
        COUNT(*) as sample_count
      FROM high_temps
      GROUP BY sensor_name
      HAVING COUNT(*) > 1
      ORDER BY peak_temp DESC
    display:
      level: detail
      layer: list
      title: "高温时段"
    save_as: high_temp_periods

  # Step 4: Thermal throttling events (from frequency drops)
  - id: throttling_events
    type: atomic
    name: "热节流事件"
    sql: |
      WITH
      time_range AS (
        SELECT MIN(ts) as start_ts FROM counter
      ),
      freq_changes AS (
        SELECT
          cct.cpu as cpu_id,
          (c.ts - (SELECT start_ts FROM time_range)) / 1e9 as time_sec,
          c.value / 1000 as freq_mhz,
          LAG(c.value / 1000) OVER (PARTITION BY cct.cpu ORDER BY c.ts) as prev_freq_mhz
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        WHERE cct.name = 'cpufreq'
      )
      SELECT
        cpu_id,
        ROUND(time_sec, 2) as time_sec,
        CAST(prev_freq_mhz AS INTEGER) as prev_freq_mhz,
        CAST(freq_mhz AS INTEGER) as new_freq_mhz,
        CAST((prev_freq_mhz - freq_mhz) AS INTEGER) as drop_mhz,
        ROUND((prev_freq_mhz - freq_mhz) * 100.0 / prev_freq_mhz, 1) as drop_pct
      FROM freq_changes
      WHERE prev_freq_mhz IS NOT NULL
        AND freq_mhz < prev_freq_mhz * 0.7
      ORDER BY drop_mhz DESC
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "频率骤降事件 (可能的热节流)"
    save_as: throttling_events

  # Step 5: Cooling device activity
  - id: cooling_activity
    type: atomic
    name: "散热设备活动"
    sql: |
      SELECT
        ct.name AS cooling_device,
        CAST(MIN(c.value) AS INTEGER) AS min_level,
        CAST(MAX(c.value) AS INTEGER) AS max_level,
        CAST(AVG(c.value) AS INTEGER) AS avg_level,
        COUNT(*) AS sample_count
      FROM counter c
      JOIN counter_track ct ON c.track_id = ct.id
      WHERE ct.name GLOB '*cooling*'
        OR ct.name GLOB '*fan*'
        OR ct.name GLOB '*cdev*'
      GROUP BY ct.name
      ORDER BY avg_level DESC
    display:
      level: detail
      layer: overview
      title: "散热设备"
    save_as: cooling_activity
    optional: true

  # Step 6: Temperature vs CPU frequency correlation
  - id: thermal_cpu_correlation
    type: atomic
    name: "温度-频率相关性"
    sql: |
      WITH
      time_range AS (
        SELECT MIN(ts) as start_ts FROM counter
      ),
      thermal_by_sec AS (
        SELECT
          CAST((c.ts - (SELECT start_ts FROM time_range)) / 1e9 AS INTEGER) as second,
          MAX(c.value) as max_temp
        FROM counter c
        JOIN counter_track ct ON c.track_id = ct.id
        WHERE ct.name GLOB '*thermal*' OR ct.name GLOB '*temp*'
        GROUP BY CAST((c.ts - (SELECT start_ts FROM time_range)) / 1e9 AS INTEGER)
      ),
      freq_by_sec AS (
        SELECT
          CAST((c.ts - (SELECT start_ts FROM time_range)) / 1e9 AS INTEGER) as second,
          CAST(AVG(c.value / 1000) AS INTEGER) as avg_freq_mhz
        FROM counter c
        JOIN cpu_counter_track cct ON c.track_id = cct.id
        WHERE cct.name = 'cpufreq'
        GROUP BY CAST((c.ts - (SELECT start_ts FROM time_range)) / 1e9 AS INTEGER)
      )
      SELECT
        t.second,
        CAST(t.max_temp AS INTEGER) as max_temp,
        f.avg_freq_mhz,
        CASE
          WHEN t.max_temp > 70 AND f.avg_freq_mhz < 1500 THEN 'thermal_throttled'
          WHEN t.max_temp > 60 AND f.avg_freq_mhz < 2000 THEN 'possible_throttle'
          ELSE 'normal'
        END as status
      FROM thermal_by_sec t
      JOIN freq_by_sec f ON t.second = f.second
      ORDER BY t.second
      LIMIT 120
    display:
      level: detail
      layer: list
      title: "温度-频率相关性"
    save_as: thermal_cpu_correlation

  # Step 7: Diagnose thermal issues
  - id: thermal_diagnosis
    type: diagnostic
    name: "热管理诊断"
    inputs: [temp_overview, high_temp_periods, throttling_events, thermal_cpu_correlation]
    rules:
      - condition: "temp_overview.data.filter(t => t.status === 'critical').length > 0"
        diagnosis: "检测到严重高温: ${temp_overview.data.filter(t => t.status === 'critical')[0]?.sensor_name} 最高 ${temp_overview.data.filter(t => t.status === 'critical')[0]?.max_temp}°C"
        confidence: critical
        suggestions:
          - "检查设备散热条件"
          - "减少 CPU/GPU 密集型操作"
          - "考虑添加冷却间隔"
        evidence_fields:
          - temp_overview.data[0]?.sensor_name
          - temp_overview.data[0]?.max_temp

      - condition: "throttling_events.data.length > 10"
        diagnosis: "检测到 ${throttling_events.data.length} 次频率骤降，热节流显著影响性能"
        confidence: high
        suggestions:
          - "工作负载过高导致热积累"
          - "考虑分散计算任务"
          - "优化算法减少 CPU 使用"
        evidence_fields:
          - throttling_events.data.length
          - throttling_events.data[0]?.drop_pct

      - condition: "high_temp_periods.data[0]?.duration_sec > 30"
        diagnosis: "高温持续 ${high_temp_periods.data[0]?.duration_sec} 秒，散热不足"
        confidence: high
        suggestions:
          - "持续高温会加速热节流"
          - "检查设备是否被遮挡"
          - "考虑降低持续性能需求"
        evidence_fields:
          - high_temp_periods.data[0]?.sensor_name
          - high_temp_periods.data[0]?.duration_sec
          - high_temp_periods.data[0]?.peak_temp

      - condition: "thermal_cpu_correlation.data.filter(t => t.status === 'thermal_throttled').length > 5"
        diagnosis: "温度与 CPU 频率呈明显负相关，热节流正在发生"
        confidence: high
        suggestions:
          - "高温直接导致 CPU 降频"
          - "性能受限于散热能力"
        evidence_fields:
          - thermal_cpu_correlation.data.filter(t => t.status === 'thermal_throttled').length

      - condition: "temp_overview.data[0]?.temp_range > 20"
        diagnosis: "温度波动较大: 变化范围 ${temp_overview.data[0]?.temp_range}°C"
        confidence: medium
        suggestions:
          - "工作负载不均匀"
          - "检查是否有突发计算任务"
        evidence_fields:
          - temp_overview.data[0]?.sensor_name
          - temp_overview.data[0]?.temp_range
    display:
      level: key
      layer: overview
      title: "热管理诊断结果"