# Hardware CPU Module Expert
#
# Provides CPU hardware analysis capabilities for cross-domain experts.
# Answers questions about CPU frequency, thermal throttling, and power state.

name: cpu_module
version: "1.0"
type: composite
category: hardware

meta:
  display_name: "CPU 硬件分析"
  description: "分析 CPU 频率、热节流和电源状态"
  tags: ["hardware", "cpu", "frequency", "thermal", "power"]

# Module metadata
module:
  layer: hardware
  component: CPU
  subsystems:
    - frequency
    - thermal
    - power
    - cluster
  relatedModules:
    - kernel_scheduler
    - hardware_gpu
    - hardware_memory

# Dialogue interface
dialogue:
  capabilities:
    - id: cpu_frequency_analysis
      questionTemplate: "What is the CPU frequency during {start_ts} to {end_ts}?"
      requiredParams: [start_ts, end_ts]
      optionalParams: [cpu_id]
      description: "Analyze CPU frequency changes and throttling"

    - id: thermal_throttling
      questionTemplate: "Is there thermal throttling affecting performance?"
      requiredParams: []
      description: "Detect thermal throttling events"

    - id: cluster_utilization
      questionTemplate: "What is the big/little core utilization?"
      requiredParams: []
      optionalParams: [package]
      description: "Analyze core cluster usage patterns"

    - id: cpu_idle_analysis
      questionTemplate: "What CPU idle states are being used?"
      requiredParams: []
      description: "Analyze CPU C-state transitions"

  findingsSchema:
    - id: thermal_throttling_detected
      severity: critical
      titleTemplate: "Thermal throttling: CPU limited to {max_freq_mhz}MHz"
      descriptionTemplate: "CPU frequency capped due to thermal limit ({thermal_zone}°C)"
      evidenceFields: [max_freq_mhz, thermal_zone, throttle_duration_ms]

    - id: low_frequency_operation
      severity: warning
      titleTemplate: "CPU running at low frequency: avg {avg_freq_mhz}MHz"
      descriptionTemplate: "CPU frequency below optimal ({avg_freq_mhz}MHz vs {max_freq_mhz}MHz capacity)"
      evidenceFields: [avg_freq_mhz, max_freq_mhz, time_at_low_freq_pct]

    - id: inefficient_cluster_usage
      severity: warning
      titleTemplate: "Inefficient cluster usage: {small_core_pct}% on small cores"
      descriptionTemplate: "Performance-critical work running on efficiency cores"
      evidenceFields: [small_core_pct, big_core_pct, total_cpu_time_ms]

    - id: frequent_frequency_changes
      severity: info
      titleTemplate: "Frequent frequency changes: {change_count} transitions"
      descriptionTemplate: "CPU frequency changing rapidly, possible governor issue"
      evidenceFields: [change_count, avg_duration_between_changes_ms]

  suggestionsSchema:
    - id: check_thermal_zone
      condition: "thermal_throttling == true"
      targetModule: thermal_module
      questionTemplate: "What is causing thermal throttling?"
      paramsMapping: {}
      priority: 1

    - id: check_power_state
      condition: "low_power_mode == true"
      targetModule: power_module
      questionTemplate: "Is power saving mode affecting CPU performance?"
      paramsMapping: {}
      priority: 2

prerequisites:
  modules:
    - linux.cpu.frequency
    - linux.cpu.idle

inputs:
  - name: cpu_id
    type: number
    required: false
    description: "Specific CPU core ID"
  - name: start_ts
    type: timestamp
    required: false
    description: "Analysis start timestamp"
  - name: end_ts
    type: timestamp
    required: false
    description: "Analysis end timestamp"

steps:
  # Step 1: Get CPU frequency overview by cluster
  - id: frequency_overview
    type: atomic
    name: "CPU 频率概览"
    sql: |
      WITH
      cpu_info AS (
        SELECT
          id as cpu,
          CASE
            WHEN capacity >= 1000 THEN 'big'
            WHEN capacity >= 500 THEN 'mid'
            ELSE 'little'
          END as cluster
        FROM cpu
      )
      SELECT
        c.cpu,
        COALESCE(ci.cluster, 'unknown') AS cluster,
        CAST(AVG(c.value) / 1000 AS INTEGER) AS avg_freq_mhz,
        CAST(MAX(c.value) / 1000 AS INTEGER) AS max_freq_mhz,
        CAST(MIN(c.value) / 1000 AS INTEGER) AS min_freq_mhz
      FROM counter c
      JOIN cpu_counter_track cct ON c.track_id = cct.id
      LEFT JOIN cpu_info ci ON cct.cpu = ci.cpu
      WHERE cct.name = 'cpufreq'
      GROUP BY c.cpu, ci.cluster
      ORDER BY c.cpu
    display:
      level: key
      layer: overview
      title: "CPU 频率概览"
    save_as: freq_overview
    synthesize:
      role: overview
      groupBy:
        - field: cluster
          title: 核心集群

  # Step 2: Detect frequency throttling events
  - id: throttling_events
    type: atomic
    name: "频率限制事件"
    sql: |
      WITH freq_changes AS (
        SELECT
          cpu,
          ts,
          freq,
          LAG(freq) OVER (PARTITION BY cpu ORDER BY ts) AS prev_freq
        FROM cpu_counter_track
        JOIN counter ON cpu_counter_track.id = counter.track_id
        WHERE cpu_counter_track.name = 'cpufreq'
      )
      SELECT
        cpu,
        ts,
        CAST(freq / 1000 AS INTEGER) AS freq_mhz,
        CAST(prev_freq / 1000 AS INTEGER) AS prev_freq_mhz,
        CASE WHEN freq < prev_freq THEN 'throttle_down' ELSE 'throttle_up' END AS direction
      FROM freq_changes
      WHERE ABS(freq - prev_freq) > 200000
      ORDER BY ts DESC
      LIMIT 50
    display:
      level: detail
      layer: list
      title: "频率变化事件"
    save_as: throttle_events

  # Step 3: CPU utilization by cluster
  - id: cluster_utilization
    type: atomic
    name: "集群利用率"
    sql: |
      WITH
      cpu_info AS (
        SELECT
          id as cpu,
          CASE
            WHEN capacity >= 1000 THEN 'big'
            WHEN capacity >= 500 THEN 'mid'
            ELSE 'little'
          END as cluster
        FROM cpu
      )
      SELECT
        COALESCE(ci.cluster, 'unknown') AS cluster,
        COUNT(DISTINCT ss.cpu) AS core_count,
        CAST(SUM(ss.dur) / 1e9 AS REAL) AS total_time_sec,
        CAST(AVG(ss.dur) / 1e6 AS REAL) AS avg_slice_ms
      FROM sched_slice ss
      LEFT JOIN cpu_info ci ON ss.cpu = ci.cpu
      GROUP BY cluster
    display:
      level: detail
      layer: overview
      title: "集群利用率"
    save_as: cluster_util
    synthesize: true

  # Step 4: Frequency distribution histogram
  - id: frequency_distribution
    type: atomic
    name: "频率分布"
    sql: |
      WITH
      cpu_info AS (
        SELECT
          id as cpu,
          CASE
            WHEN capacity >= 1000 THEN 'big'
            WHEN capacity >= 500 THEN 'mid'
            ELSE 'little'
          END as cluster
        FROM cpu
      )
      SELECT
        COALESCE(ci.cluster, 'unknown') AS cluster,
        CAST(c.value / 100000 AS INTEGER) * 100 AS freq_bucket_mhz,
        COUNT(*) AS sample_count,
        CAST(SUM(LEAD(c.ts, 1, c.ts) OVER (PARTITION BY c.cpu ORDER BY c.ts) - c.ts) / 1e9 AS REAL) AS time_sec
      FROM counter c
      JOIN cpu_counter_track cct ON c.track_id = cct.id
      LEFT JOIN cpu_info ci ON cct.cpu = ci.cpu
      WHERE cct.name = 'cpufreq'
      GROUP BY cluster, freq_bucket_mhz
      ORDER BY cluster, freq_bucket_mhz
    display:
      level: detail
      layer: list
      title: "频率分布"
    save_as: freq_dist

  # Step 5: Diagnose CPU issues
  - id: cpu_diagnosis
    type: diagnostic
    name: "CPU 诊断"
    inputs: [freq_overview, throttle_events, cluster_util]
    rules:
      - condition: "freq_overview.data.find(f => f.cluster === 'big')?.avg_freq_mhz < 1500"
        diagnosis: "大核 CPU 平均频率较低 (${freq_overview.data.find(f => f.cluster === 'big')?.avg_freq_mhz}MHz)，可能存在热节流或功耗限制"
        confidence: high
        suggestions:
          - "检查设备温度"
          - "检查是否开启省电模式"
        evidence_fields:
          - freq_overview.data[0].avg_freq_mhz
          - freq_overview.data[0].max_freq_mhz

      - condition: "throttle_events.data.length > 20"
        diagnosis: "CPU 频率频繁变化 (${throttle_events.data.length} 次)，调度器可能不稳定"
        confidence: medium
        suggestions:
          - "检查 governor 设置"
          - "检查是否有功耗抖动"
        evidence_fields:
          - throttle_events.data.length

      - condition: "freq_overview.data.find(f => f.cluster === 'little')?.avg_freq_mhz > freq_overview.data.find(f => f.cluster === 'big')?.avg_freq_mhz"
        diagnosis: "小核频率高于大核，可能存在调度异常或热节流"
        confidence: medium
        suggestions:
          - "检查大核是否被热节流"
          - "检查 CPU affinity 设置"
        evidence_fields:
          - freq_overview.data[0].avg_freq_mhz
    display:
      level: key
      layer: overview
      title: "CPU 诊断结果"
