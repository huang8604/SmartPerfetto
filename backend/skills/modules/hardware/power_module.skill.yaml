# =============================================================================
# Hardware Power Module Expert
# =============================================================================
# Provides power analysis capabilities for cross-domain experts.
# Answers questions about wakelocks, CPU idle, power states, and suspend/resume.
#
# Key Analysis Areas:
# - Wakelock hold times and patterns
# - CPU idle state (C-state) transitions
# - Power mode changes (battery saver, performance)
# - Suspend/resume timing
# - Power consumption patterns
# =============================================================================

name: power_module
version: "1.0"
type: composite
category: hardware

meta:
  display_name: "电源管理分析"
  description: "分析 Wakelock、CPU 空闲状态和电源策略"
  tags: ["hardware", "power", "wakelock", "idle", "suspend", "battery"]

# Module metadata
module:
  layer: hardware
  component: Power
  subsystems:
    - wakelock
    - cpu_idle
    - power_mode
    - suspend_resume
  relatedModules:
    - hardware_cpu
    - kernel_scheduler
    - framework_ams

# Dialogue interface
dialogue:
  capabilities:
    - id: wakelock_analysis
      questionTemplate: "What wakelocks are held by package {package}?"
      requiredParams: []
      optionalParams: [package]
      description: "Analyze wakelock usage patterns"

    - id: cpu_idle_analysis
      questionTemplate: "What CPU idle states are being used?"
      requiredParams: []
      description: "Analyze CPU C-state transitions"

    - id: power_mode_changes
      questionTemplate: "Were there any power mode changes during the trace?"
      requiredParams: []
      description: "Detect power/battery mode changes"

    - id: suspend_resume_timing
      questionTemplate: "What are the suspend/resume timings?"
      requiredParams: []
      description: "Analyze device suspend/resume behavior"

    - id: power_efficiency
      questionTemplate: "Is the power usage efficient?"
      requiredParams: []
      description: "Assess overall power efficiency"

  findingsSchema:
    - id: long_wakelock
      severity: warning
      titleTemplate: "Long wakelock: {wakelock_name} held for {duration_ms}ms"
      descriptionTemplate: "Wakelock preventing device sleep"
      evidenceFields: [wakelock_name, duration_ms, holder_process]

    - id: cpu_never_idle
      severity: warning
      titleTemplate: "CPU {cpu_id} never reached deep idle"
      descriptionTemplate: "CPU not entering power-saving states"
      evidenceFields: [cpu_id, shallow_idle_pct, deep_idle_pct]

    - id: frequent_wakeups
      severity: warning
      titleTemplate: "Frequent wakeups: {wakeup_count} times"
      descriptionTemplate: "Device waking frequently, impacting battery"
      evidenceFields: [wakeup_count, avg_sleep_duration_ms]

    - id: inefficient_power_usage
      severity: info
      titleTemplate: "Inefficient power pattern detected"
      descriptionTemplate: "Power usage could be optimized"
      evidenceFields: [issue_type, recommendation]

  suggestionsSchema:
    - id: check_cpu_frequency
      condition: "cpu_not_idle == true"
      targetModule: cpu_module
      questionTemplate: "Why is CPU not entering idle state?"
      paramsMapping: {}
      priority: 1

    - id: check_scheduler
      condition: "frequent_wakeups > 10"
      targetModule: scheduler_module
      questionTemplate: "What is waking up the CPU?"
      paramsMapping: {}
      priority: 1

prerequisites:
  required_tables:
    - counter
    - counter_track
  optional_tables:
    - slice
    - android_suspend_resume

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"

steps:
  # Step 1: Wakelock overview
  - id: wakelock_overview
    type: atomic
    name: "Wakelock 概览"
    sql: |
      SELECT
        s.name AS wakelock_event,
        COUNT(*) AS event_count,
        CAST(SUM(s.dur) / 1e6 AS INTEGER) AS total_ms,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_ms,
        CAST(MAX(s.dur) / 1e6 AS INTEGER) AS max_ms
      FROM slice s
      WHERE s.name GLOB '*wakelock*'
        OR s.name GLOB '*Wakelock*'
        OR s.name GLOB '*WAKE_LOCK*'
        OR s.name GLOB '*PowerManager*'
        OR s.name GLOB '*acquire*wake*'
      GROUP BY s.name
      ORDER BY total_ms DESC
      LIMIT 20
    display:
      level: key
      layer: overview
      title: "Wakelock 统计"
    save_as: wakelock_overview
    synthesize:
      role: overview
      fields:
        - key: wakelock_event
          label: Wakelock
        - key: event_count
          label: 次数
        - key: total_ms
          label: 总持有时间
          format: "{{value}}ms"
    on_empty: "未检测到 Wakelock 事件"

  # Step 2: Long wakelocks (> 1 second)
  - id: long_wakelocks
    type: atomic
    name: "长时间 Wakelock"
    sql: |
      SELECT
        s.ts,
        s.name AS wakelock_name,
        CAST(s.dur / 1e6 AS INTEGER) AS dur_ms,
        t.name AS thread_name,
        p.name AS process_name
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE (s.name GLOB '*wakelock*'
             OR s.name GLOB '*Wakelock*'
             OR s.name GLOB '*WAKE_LOCK*')
        AND s.dur > 1000000000  -- > 1 second
      ORDER BY s.dur DESC
      LIMIT 20
    display:
      level: detail
      layer: list
      title: "长时间持有的 Wakelock"
    save_as: long_wakelocks

  # Step 3: CPU idle state analysis
  - id: cpu_idle_states
    type: atomic
    name: "CPU 空闲状态"
    sql: |
      SELECT
        ct.name AS idle_state,
        CAST(MIN(c.value) AS INTEGER) AS min_value,
        CAST(MAX(c.value) AS INTEGER) AS max_value,
        CAST(AVG(c.value) AS INTEGER) AS avg_value,
        COUNT(*) AS sample_count
      FROM counter c
      JOIN counter_track ct ON c.track_id = ct.id
      WHERE ct.name GLOB '*idle*'
        OR ct.name GLOB '*Idle*'
        OR ct.name GLOB '*cpuidle*'
        OR ct.name GLOB '*C-state*'
      GROUP BY ct.name
      ORDER BY avg_value DESC
    display:
      level: detail
      layer: overview
      title: "CPU 空闲状态"
    save_as: cpu_idle_states
    optional: true

  # Step 4: Suspend/Resume events
  - id: suspend_resume
    type: atomic
    name: "休眠/唤醒事件"
    sql: |
      SELECT
        s.ts,
        s.name AS event_type,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms
      FROM slice s
      WHERE s.name GLOB '*suspend*'
        OR s.name GLOB '*resume*'
        OR s.name GLOB '*Suspend*'
        OR s.name GLOB '*Resume*'
        OR s.name GLOB '*SUSPEND*'
        OR s.name GLOB '*RESUME*'
        OR s.name GLOB '*sleep*'
        OR s.name GLOB '*wakeup*'
      ORDER BY s.ts
      LIMIT 50
    display:
      level: detail
      layer: list
      title: "休眠/唤醒事件"
    save_as: suspend_resume

  # Step 5: Power counter overview
  - id: power_counters
    type: atomic
    name: "电源计数器"
    sql: |
      SELECT
        ct.name AS counter_name,
        CAST(MIN(c.value) AS REAL) AS min_value,
        CAST(MAX(c.value) AS REAL) AS max_value,
        CAST(AVG(c.value) AS REAL) AS avg_value,
        COUNT(*) AS sample_count
      FROM counter c
      JOIN counter_track ct ON c.track_id = ct.id
      WHERE ct.name GLOB '*power*'
        OR ct.name GLOB '*Power*'
        OR ct.name GLOB '*battery*'
        OR ct.name GLOB '*Battery*'
        OR ct.name GLOB '*current*'
        OR ct.name GLOB '*voltage*'
        OR ct.name GLOB '*energy*'
      GROUP BY ct.name
      ORDER BY avg_value DESC
    display:
      level: detail
      layer: overview
      title: "电源计数器"
    save_as: power_counters

  # Step 6: Power mode changes
  - id: power_mode_events
    type: atomic
    name: "电源模式变化"
    sql: |
      SELECT
        s.ts,
        s.name AS mode_event,
        CAST(s.dur / 1e6 AS REAL) AS dur_ms
      FROM slice s
      WHERE s.name GLOB '*battery*saver*'
        OR s.name GLOB '*power*mode*'
        OR s.name GLOB '*performance*mode*'
        OR s.name GLOB '*doze*'
        OR s.name GLOB '*Doze*'
        OR s.name GLOB '*standby*'
      ORDER BY s.ts
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "电源模式变化"
    save_as: power_mode_events

  # Step 7: Wakeup sources
  - id: wakeup_sources
    type: atomic
    name: "唤醒源"
    sql: |
      SELECT
        s.name AS wakeup_source,
        COUNT(*) AS wakeup_count,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_dur_ms
      FROM slice s
      WHERE s.name GLOB '*wakeup*'
        OR s.name GLOB '*wake_source*'
        OR s.name GLOB '*irq*wake*'
        OR s.name GLOB '*alarm*'
      GROUP BY s.name
      ORDER BY wakeup_count DESC
      LIMIT 15
    display:
      level: detail
      layer: list
      title: "唤醒源"
    save_as: wakeup_sources

  # Step 8: Diagnose power issues
  - id: power_diagnosis
    type: diagnostic
    name: "电源诊断"
    inputs: [wakelock_overview, long_wakelocks, cpu_idle_states, suspend_resume, wakeup_sources]
    rules:
      - condition: "long_wakelocks.data.length > 0"
        diagnosis: "检测到 ${long_wakelocks.data.length} 个长时间持有的 Wakelock，最长 ${long_wakelocks.data[0]?.dur_ms}ms"
        confidence: high
        suggestions:
          - "检查 Wakelock 是否必要"
          - "确保在完成任务后释放 Wakelock"
          - "考虑使用 WorkManager 替代"
        evidence_fields:
          - long_wakelocks.data.length
          - long_wakelocks.data[0]?.wakelock_name
          - long_wakelocks.data[0]?.dur_ms

      - condition: "wakelock_overview.data[0]?.total_ms > 10000"
        diagnosis: "Wakelock 总持有时间 ${wakelock_overview.data[0]?.total_ms}ms，电量消耗较高"
        confidence: high
        suggestions:
          - "优化 Wakelock 使用策略"
          - "减少不必要的唤醒"
        evidence_fields:
          - wakelock_overview.data[0]?.wakelock_event
          - wakelock_overview.data[0]?.total_ms

      - condition: "wakeup_sources.data[0]?.wakeup_count > 20"
        diagnosis: "唤醒次数过多: ${wakeup_sources.data[0]?.wakeup_source} 唤醒了 ${wakeup_sources.data[0]?.wakeup_count} 次"
        confidence: medium
        suggestions:
          - "合并定时任务减少唤醒"
          - "使用 AlarmManager.setInexactRepeating()"
        evidence_fields:
          - wakeup_sources.data[0]?.wakeup_source
          - wakeup_sources.data[0]?.wakeup_count

      - condition: "suspend_resume.data.length < 2"
        diagnosis: "设备未进入深度休眠，电量消耗增加"
        confidence: medium
        suggestions:
          - "检查是否有前台服务阻止休眠"
          - "检查 Wakelock 使用情况"
        evidence_fields:
          - suspend_resume.data.length

      - condition: "cpu_idle_states.data[0]?.avg_value < 50"
        diagnosis: "CPU 空闲状态使用不充分"
        confidence: medium
        suggestions:
          - "检查后台任务是否过多"
          - "优化定时器触发频率"
        evidence_fields:
          - cpu_idle_states.data[0]?.idle_state
          - cpu_idle_states.data[0]?.avg_value
    display:
      level: key
      layer: overview
      title: "电源诊断结果"