# Kernel Binder Module Expert
#
# Provides Binder IPC analysis capabilities for cross-domain experts.
# Answers questions about cross-process calls, blocking transactions, and latency.

name: binder_module
version: "1.0"
type: composite
category: kernel

meta:
  display_name: "Binder IPC 分析"
  description: "分析跨进程 Binder 调用、阻塞事务和调用延迟"
  tags: ["kernel", "binder", "ipc", "blocking"]

# Module metadata
module:
  layer: kernel
  component: Binder
  subsystems:
    - transaction
    - reply
    - async
  relatedModules:
    - framework_ams
    - framework_wms
    - kernel_scheduler

# Dialogue interface
dialogue:
  capabilities:
    - id: binder_blocking_calls
      questionTemplate: "What Binder calls blocked thread {tid}?"
      requiredParams: [tid]
      optionalParams: [start_ts, end_ts]
      description: "Find blocking Binder transactions for a thread"

    - id: binder_latency
      questionTemplate: "What is the Binder latency between {caller} and {callee}?"
      requiredParams: [caller, callee]
      description: "Analyze Binder transaction latency between processes"

    - id: heavy_binder_users
      questionTemplate: "What are the heaviest Binder users for package {package}?"
      requiredParams: [package]
      description: "Find processes making many Binder calls"

  findingsSchema:
    - id: long_binder_transaction
      severity: critical
      titleTemplate: "Long Binder transaction: {interface} took {dur_ms}ms"
      descriptionTemplate: "Synchronous Binder call to {interface} blocked for {dur_ms}ms"
      evidenceFields: [interface, dur_ms, caller_process, server_process]

    - id: excessive_binder_calls
      severity: warning
      titleTemplate: "Excessive Binder calls: {call_count} calls to {interface}"
      descriptionTemplate: "Process made {call_count} Binder calls totaling {total_ms}ms"
      evidenceFields: [interface, call_count, total_ms]

  suggestionsSchema:
    - id: check_server_process
      condition: "server_process != package"
      targetModule: scheduler_module
      questionTemplate: "Why was server process {server_process} slow?"
      paramsMapping:
        package: server_process
      priority: 1

    - id: check_gc_during_binder
      condition: "dur_ms > 10"
      targetModule: art_module
      questionTemplate: "Was there GC during Binder call at {ts}?"
      paramsMapping:
        ts: start_ts
      priority: 2

prerequisites:
  modules:
    - android.binder

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"
  - name: tid
    type: number
    required: false
    description: "Target thread ID"
  - name: caller
    type: string
    required: false
    description: "Caller process name"
  - name: callee
    type: string
    required: false
    description: "Callee process name"

steps:
  # Step 1: Get Binder transaction summary
  - id: binder_summary
    type: atomic
    name: "Binder 调用概览"
    sql: |
      SELECT
        client_process AS caller_process,
        server_process,
        aidl_name AS interface,
        COUNT(*) AS call_count,
        CAST(SUM(client_dur) / 1e6 AS INTEGER) AS total_ms,
        CAST(AVG(client_dur) / 1e6 AS REAL) AS avg_ms,
        CAST(MAX(client_dur) / 1e6 AS REAL) AS max_ms,
        SUM(CASE WHEN is_sync = 1 THEN 1 ELSE 0 END) AS sync_count
      FROM android_binder_txns
      WHERE client_process LIKE '%${package}%'
        OR server_process LIKE '%${package}%'
      GROUP BY client_process, server_process, aidl_name
      HAVING total_ms > 1
      ORDER BY total_ms DESC
      LIMIT 20
    display:
      level: detail
      layer: overview
      title: "Binder 调用统计"
    save_as: binder_stats
    synthesize: true

  # Step 2: Get long synchronous Binder calls
  - id: long_sync_calls
    type: atomic
    name: "耗时同步调用"
    sql: |
      SELECT
        client_ts AS ts,
        client_process AS caller_process,
        server_process,
        aidl_name AS interface,
        CAST(client_dur / 1e6 AS REAL) AS dur_ms,
        client_tid,
        server_tid
      FROM android_binder_txns
      WHERE is_sync = 1
        AND client_dur > 5000000  -- > 5ms
        AND (client_process LIKE '%${package}%' OR server_process LIKE '%${package}%')
      ORDER BY client_dur DESC
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "耗时同步 Binder 调用"
    save_as: long_calls
    synthesize: true

  # Step 3: Analyze blocking patterns
  - id: blocking_analysis
    type: atomic
    name: "阻塞模式分析"
    sql: |
      SELECT
        server_process,
        aidl_name AS interface,
        COUNT(*) AS block_count,
        CAST(SUM(client_dur) / 1e6 AS INTEGER) AS total_block_ms,
        CAST(AVG(client_dur) / 1e6 AS REAL) AS avg_block_ms
      FROM android_binder_txns
      WHERE is_sync = 1
        AND client_dur > 2000000  -- > 2ms considered blocking
        AND client_process LIKE '%${package}%'
      GROUP BY server_process, aidl_name
      ORDER BY total_block_ms DESC
      LIMIT 10
    display:
      level: detail
      layer: list
      title: "Binder 阻塞分析"
    save_as: blocking_data

  # Step 4: Diagnose Binder issues
  - id: binder_diagnosis
    type: diagnostic
    name: "Binder 诊断"
    inputs: [binder_stats, long_calls, blocking_data]
    rules:
      - condition: "long_calls.data[0]?.dur_ms > 16"
        diagnosis: "发现长耗时 Binder 调用: ${long_calls.data[0]?.interface} (${long_calls.data[0]?.dur_ms}ms)，主线程被阻塞"
        confidence: high
        suggestions:
          - "考虑将该 Binder 调用移至后台线程"
          - "检查服务端处理是否有性能问题"
        evidence_fields:
          - long_calls.data[0].interface
          - long_calls.data[0].dur_ms
          - long_calls.data[0].server_process

      - condition: "binder_stats.data[0]?.sync_count > 20"
        diagnosis: "Binder 同步调用次数过多: ${binder_stats.data[0]?.interface} (${binder_stats.data[0]?.sync_count} 次)"
        confidence: medium
        suggestions:
          - "考虑批量处理减少调用次数"
          - "使用异步 Binder 调用"
        evidence_fields:
          - binder_stats.data[0].interface
          - binder_stats.data[0].sync_count
          - binder_stats.data[0].total_ms

      - condition: "blocking_data.data[0]?.total_block_ms > 50"
        diagnosis: "Binder 调用累计阻塞时间过长: ${blocking_data.data[0]?.server_process} (${blocking_data.data[0]?.total_block_ms}ms)"
        confidence: medium
        suggestions:
          - "检查服务端进程是否繁忙"
          - "考虑缓存调用结果"
        evidence_fields:
          - blocking_data.data[0].server_process
          - blocking_data.data[0].total_block_ms
    display:
      level: key
      layer: overview
      title: "Binder 诊断结果"