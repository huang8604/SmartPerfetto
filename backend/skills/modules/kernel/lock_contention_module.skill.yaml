# =============================================================================
# Kernel Lock Contention Module Expert
# =============================================================================
# Provides lock/mutex contention analysis capabilities for cross-domain experts.
# Answers questions about mutex waits, monitor contention, and synchronization issues.
#
# Key Analysis Areas:
# - Mutex/Futex wait times
# - Java monitor contention (synchronized blocks)
# - ReentrantLock wait analysis
# - Deadlock detection hints
# - Priority inversion detection
# =============================================================================

name: lock_contention_module
version: "1.0"
type: composite
category: kernel

meta:
  display_name: "锁竞争分析"
  description: "分析 Mutex/Monitor 竞争、死锁和优先级反转"
  tags: ["kernel", "lock", "mutex", "monitor", "contention", "synchronization"]

# Module metadata
module:
  layer: kernel
  component: LockContention
  subsystems:
    - mutex
    - futex
    - monitor
    - rwlock
  relatedModules:
    - kernel_scheduler
    - framework_art
    - app_third_party

# Dialogue interface
dialogue:
  capabilities:
    - id: lock_contention_overview
      questionTemplate: "What lock contention exists for package {package}?"
      requiredParams: [package]
      description: "Overview of lock contention issues"

    - id: monitor_contention
      questionTemplate: "What Java monitor contention exists for package {package}?"
      requiredParams: [package]
      description: "Analyze synchronized block contention"

    - id: mutex_wait_analysis
      questionTemplate: "What mutex waits happened for thread {tid}?"
      requiredParams: [tid]
      optionalParams: [start_ts, end_ts]
      description: "Analyze specific thread's mutex waits"

    - id: lock_holder_analysis
      questionTemplate: "Who is holding the lock that thread {tid} is waiting for?"
      requiredParams: [tid]
      description: "Find lock holder causing contention"

  findingsSchema:
    - id: high_lock_contention
      severity: critical
      titleTemplate: "High lock contention: {wait_ms}ms total wait"
      descriptionTemplate: "Thread spent {wait_ms}ms waiting for locks"
      evidenceFields: [wait_ms, lock_name, waiting_thread, holder_thread]

    - id: monitor_contention_detected
      severity: warning
      titleTemplate: "Monitor contention: {contention_count} waits on {monitor}"
      descriptionTemplate: "Java synchronized block causing contention"
      evidenceFields: [monitor, contention_count, total_wait_ms, avg_wait_ms]

    - id: potential_deadlock
      severity: critical
      titleTemplate: "Potential deadlock between {thread1} and {thread2}"
      descriptionTemplate: "Circular lock dependency detected"
      evidenceFields: [thread1, thread2, lock1, lock2]

    - id: priority_inversion
      severity: warning
      titleTemplate: "Priority inversion: high priority thread waiting"
      descriptionTemplate: "High priority thread {high_thread} waiting for low priority {low_thread}"
      evidenceFields: [high_thread, low_thread, wait_ms]

    - id: long_lock_hold
      severity: warning
      titleTemplate: "Long lock hold: {hold_ms}ms"
      descriptionTemplate: "Lock held for {hold_ms}ms, causing others to wait"
      evidenceFields: [hold_ms, holder_thread, lock_name]

  suggestionsSchema:
    - id: check_thread_state
      condition: "wait_ms > 50"
      targetModule: scheduler_module
      questionTemplate: "What is the lock holder thread doing?"
      paramsMapping:
        tid: holder_tid
      priority: 1

    - id: check_gc_holding_lock
      condition: "holder_thread contains 'GC'"
      targetModule: art_module
      questionTemplate: "Is GC holding locks during collection?"
      paramsMapping:
        package: package
      priority: 1

prerequisites:
  required_tables:
    - slice
    - thread
    - process
    - thread_state

inputs:
  - name: package
    type: string
    required: false
    description: "Target package name"
  - name: tid
    type: number
    required: false
    description: "Target thread ID"
  - name: start_ts
    type: timestamp
    required: false
    description: "Analysis start timestamp"
  - name: end_ts
    type: timestamp
    required: false
    description: "Analysis end timestamp"

steps:
  # Step 1: Lock contention overview
  - id: lock_contention_overview
    type: atomic
    name: "锁竞争概览"
    sql: |
      SELECT
        s.name AS lock_event,
        COUNT(*) AS event_count,
        CAST(SUM(s.dur) / 1e6 AS INTEGER) AS total_wait_ms,
        CAST(AVG(s.dur) / 1e6 AS REAL) AS avg_wait_ms,
        CAST(MAX(s.dur) / 1e6 AS REAL) AS max_wait_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND (s.name GLOB '*lock*'
             OR s.name GLOB '*Lock*'
             OR s.name GLOB '*mutex*'
             OR s.name GLOB '*Mutex*'
             OR s.name GLOB '*monitor*'
             OR s.name GLOB '*Monitor*'
             OR s.name GLOB '*contention*'
             OR s.name GLOB '*wait*'
             OR s.name GLOB '*futex*')
        AND s.dur > 100000  -- > 0.1ms
      GROUP BY s.name
      ORDER BY total_wait_ms DESC
      LIMIT 20
    display:
      level: key
      layer: overview
      title: "锁竞争统计"
    save_as: lock_overview
    synthesize:
      role: overview
      fields:
        - key: lock_event
          label: 锁事件
        - key: event_count
          label: 次数
        - key: total_wait_ms
          label: 总等待时间
          format: "{{value}}ms"
    on_empty: "未检测到明显的锁竞争事件"

  # Step 2: Monitor contention (Java synchronized)
  - id: monitor_contention
    type: atomic
    name: "Monitor 竞争"
    sql: |
      SELECT
        s.ts,
        s.name AS monitor_event,
        CAST(s.dur / 1e6 AS REAL) AS wait_ms,
        t.name AS waiting_thread,
        t.tid AS waiting_tid
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND (s.name GLOB '*monitor*'
             OR s.name GLOB '*Monitor*'
             OR s.name GLOB '*LockContention*'
             OR s.name GLOB '*synchronized*')
        AND s.dur > 1000000  -- > 1ms
      ORDER BY s.dur DESC
      LIMIT 30
    display:
      level: detail
      layer: list
      title: "Monitor 竞争事件"
    save_as: monitor_contention

  # Step 3: Thread blocked state analysis (waiting for lock)
  - id: blocked_threads
    type: atomic
    name: "阻塞线程分析"
    sql: |
      SELECT
        t.name AS thread_name,
        t.tid,
        ts.state,
        CAST(SUM(ts.dur) / 1e6 AS INTEGER) AS blocked_ms,
        COUNT(*) AS block_count,
        CAST(AVG(ts.dur) / 1e6 AS REAL) AS avg_block_ms,
        CAST(MAX(ts.dur) / 1e6 AS REAL) AS max_block_ms
      FROM thread_state ts
      JOIN thread t USING (utid)
      JOIN process p USING (upid)
      WHERE p.name LIKE '%${package}%'
        AND ts.state IN ('D', 'S')  -- Blocked or sleeping (could be lock wait)
        AND ts.dur > 1000000  -- > 1ms
      GROUP BY t.utid, ts.state
      HAVING blocked_ms > 5
      ORDER BY blocked_ms DESC
      LIMIT 20
    display:
      level: detail
      layer: list
      title: "线程阻塞统计"
    save_as: blocked_threads
    synthesize: true

  # Step 4: Main thread lock waits
  - id: main_thread_locks
    type: atomic
    name: "主线程锁等待"
    sql: |
      SELECT
        s.ts,
        s.name AS lock_event,
        CAST(s.dur / 1e6 AS REAL) AS wait_ms
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.tid = p.pid  -- Main thread
        AND (s.name GLOB '*lock*'
             OR s.name GLOB '*Lock*'
             OR s.name GLOB '*mutex*'
             OR s.name GLOB '*monitor*'
             OR s.name GLOB '*contention*'
             OR s.name GLOB '*wait*')
        AND s.dur > 1000000
      ORDER BY s.dur DESC
      LIMIT 20
    display:
      level: detail
      layer: list
      title: "主线程锁等待"
    save_as: main_thread_locks

  # Step 5: Binder thread lock waits
  - id: binder_thread_locks
    type: atomic
    name: "Binder 线程锁等待"
    sql: |
      SELECT
        t.name AS binder_thread,
        s.name AS lock_event,
        CAST(s.dur / 1e6 AS REAL) AS wait_ms,
        s.ts
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND t.name LIKE '%Binder%'
        AND (s.name GLOB '*lock*'
             OR s.name GLOB '*Lock*'
             OR s.name GLOB '*mutex*'
             OR s.name GLOB '*contention*')
        AND s.dur > 1000000
      ORDER BY s.dur DESC
      LIMIT 15
    display:
      level: detail
      layer: list
      title: "Binder 线程锁等待"
    save_as: binder_thread_locks

  # Step 6: Long lock holds (potential blocking others)
  - id: long_lock_holds
    type: atomic
    name: "长时间锁持有"
    sql: |
      SELECT
        s.ts,
        s.name AS lock_operation,
        CAST(s.dur / 1e6 AS REAL) AS hold_ms,
        t.name AS holder_thread,
        t.tid AS holder_tid
      FROM slice s
      JOIN thread_track tt ON s.track_id = tt.id
      JOIN thread t ON tt.utid = t.utid
      JOIN process p ON t.upid = p.upid
      WHERE p.name LIKE '%${package}%'
        AND (s.name GLOB '*holding*lock*'
             OR s.name GLOB '*acquired*'
             OR s.name GLOB '*lock*held*'
             OR (s.name GLOB '*synchronized*' AND s.dur > 5000000))
        AND s.dur > 5000000  -- > 5ms
      ORDER BY s.dur DESC
      LIMIT 15
    display:
      level: detail
      layer: list
      title: "长时间锁持有"
    save_as: long_lock_holds
    optional: true

  # Step 7: Thread contention by thread pair
  - id: thread_contention_pairs
    type: atomic
    name: "线程竞争关系"
    sql: |
      SELECT
        t.name AS thread_name,
        SUM(CASE WHEN ts.state = 'R' THEN ts.dur ELSE 0 END) / 1e6 AS runnable_ms,
        SUM(CASE WHEN ts.state IN ('D', 'S') THEN ts.dur ELSE 0 END) / 1e6 AS blocked_ms,
        ROUND(SUM(CASE WHEN ts.state IN ('D', 'S') THEN ts.dur ELSE 0 END) * 100.0 /
              SUM(ts.dur), 2) AS blocked_pct
      FROM thread_state ts
      JOIN thread t USING (utid)
      JOIN process p USING (upid)
      WHERE p.name LIKE '%${package}%'
        AND t.name NOT LIKE '%Binder%'
        AND t.name NOT LIKE '%FinalizerDaemon%'
      GROUP BY t.utid
      HAVING blocked_pct > 20
      ORDER BY blocked_ms DESC
      LIMIT 15
    display:
      level: detail
      layer: list
      title: "线程阻塞比例"
    save_as: thread_contention_pairs

  # Step 8: Diagnose lock contention issues
  - id: lock_diagnosis
    type: diagnostic
    name: "锁竞争诊断"
    inputs: [lock_overview, monitor_contention, blocked_threads, main_thread_locks]
    rules:
      - condition: "main_thread_locks.data.length > 0"
        diagnosis: "主线程检测到 ${main_thread_locks.data.length} 次锁等待，最长 ${main_thread_locks.data[0]?.wait_ms}ms"
        confidence: critical
        suggestions:
          - "主线程不应等待锁"
          - "将竞争资源的访问移至后台线程"
          - "使用无锁数据结构"
        evidence_fields:
          - main_thread_locks.data.length
          - main_thread_locks.data[0]?.lock_event
          - main_thread_locks.data[0]?.wait_ms

      - condition: "lock_overview.data[0]?.total_wait_ms > 100"
        diagnosis: "锁竞争总等待时间 ${lock_overview.data[0]?.total_wait_ms}ms"
        confidence: high
        suggestions:
          - "减少临界区代码"
          - "考虑使用细粒度锁"
          - "使用读写锁分离"
        evidence_fields:
          - lock_overview.data[0]?.lock_event
          - lock_overview.data[0]?.total_wait_ms

      - condition: "monitor_contention.data[0]?.wait_ms > 10"
        diagnosis: "Java Monitor 竞争: ${monitor_contention.data[0]?.monitor_event} 等待 ${monitor_contention.data[0]?.wait_ms}ms"
        confidence: high
        suggestions:
          - "检查 synchronized 块的必要性"
          - "考虑使用 ReentrantLock 提供更好的控制"
          - "缩小 synchronized 范围"
        evidence_fields:
          - monitor_contention.data[0]?.monitor_event
          - monitor_contention.data[0]?.wait_ms
          - monitor_contention.data[0]?.waiting_thread

      - condition: "blocked_threads.data.filter(t => t.state === 'D').length > 3"
        diagnosis: "多个线程处于不可中断阻塞状态，可能存在 I/O 或锁等待"
        confidence: medium
        suggestions:
          - "检查是否有 I/O 阻塞"
          - "检查是否有内核锁竞争"
        evidence_fields:
          - blocked_threads.data.filter(t => t.state === 'D').length

      - condition: "thread_contention_pairs.data[0]?.blocked_pct > 30"
        diagnosis: "线程 ${thread_contention_pairs.data[0]?.thread_name} 阻塞时间占比 ${thread_contention_pairs.data[0]?.blocked_pct}%"
        confidence: medium
        suggestions:
          - "该线程大部分时间在等待"
          - "分析其等待的资源"
        evidence_fields:
          - thread_contention_pairs.data[0]?.thread_name
          - thread_contention_pairs.data[0]?.blocked_pct
    display:
      level: key
      layer: overview
      title: "锁竞争诊断结果"